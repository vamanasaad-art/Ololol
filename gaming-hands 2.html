<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GAMING HANDS</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;-webkit-user-select:none;font-family:'Courier New',monospace;}
  #c{position:fixed;inset:0;width:100%;height:100%;z-index:1;}
  #vid{position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;}

  /* SPLASH */
  #splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;padding:env(safe-area-inset-top,20px) 28px env(safe-area-inset-bottom,20px);transition:opacity .7s;}
  #splash.gone{opacity:0;pointer-events:none;}
  .ico{font-size:52px;animation:bob 2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  #splash h1{font-size:clamp(24px,8vw,44px);font-weight:900;letter-spacing:.1em;text-align:center;line-height:1.1;}
  .tag{font-size:10px;letter-spacing:.4em;text-align:center;opacity:.6;}
  #splash p{font-size:11px;line-height:1.9;color:rgba(255,255,255,.4);text-align:center;max-width:270px;}
  #splash p strong{opacity:.9;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .cam-btn{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-family:'Courier New',monospace;font-size:10px;font-weight:700;letter-spacing:.18em;padding:9px 16px;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent;transition:all .2s;border-radius:2px;}
  .cam-btn.sel{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.7);color:#fff;}
  #startBtn{background:transparent;font-family:'Courier New',monospace;font-size:13px;font-weight:700;letter-spacing:.26em;padding:14px 42px;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent;transition:all .2s;margin-top:4px;}
  #startBtn:active{transform:scale(.97);}

  /* LOADER */
  #loader{position:fixed;inset:0;background:rgba(0,0,0,.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:300;}
  #loader.show{display:flex;}
  #lmsg{font-size:11px;letter-spacing:.26em;animation:blink 1s infinite;text-align:center;max-width:280px;line-height:1.9;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  #ltrack{width:200px;height:2px;border-radius:2px;overflow:hidden;background:rgba(255,255,255,.1);}
  #lfill{height:100%;width:0%;transition:width .3s ease;}

  /* HUD */
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:calc(env(safe-area-inset-top,0px)+12px) 14px 0;z-index:50;pointer-events:none;}
  #logo{font-size:11px;font-weight:900;letter-spacing:.18em;line-height:1.4;}
  #logo small{display:block;font-size:8px;letter-spacing:.28em;opacity:.45;}
  #camToggle{font-size:9px;letter-spacing:.1em;padding:5px 10px;border:1px solid rgba(255,255,255,.18);border-radius:20px;color:rgba(255,255,255,.4);background:rgba(0,0,0,.4);cursor:pointer;-webkit-tap-highlight-color:transparent;pointer-events:all;transition:all .2s;}

  /* MODE SWITCHER */
  #modebar{
    position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+52px);
    left:50%;transform:translateX(-50%);
    display:flex;gap:8px;z-index:50;
    background:rgba(0,0,0,.55);
    padding:8px 12px;border-radius:40px;
    border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(8px);
  }
  .modeBtn{
    width:38px;height:38px;border-radius:50%;
    border:1.5px solid rgba(255,255,255,.15);
    background:transparent;font-size:18px;
    cursor:pointer;-webkit-tap-highlight-color:transparent;
    display:flex;align-items:center;justify-content:center;
    transition:all .25s;
  }
  .modeBtn.active{border-width:2px;transform:scale(1.15);}

  #hint{position:fixed;bottom:calc(env(safe-area-inset-bottom,8px)+8px);left:0;right:0;text-align:center;font-size:9px;letter-spacing:.16em;color:rgba(255,255,255,.18);text-transform:uppercase;z-index:49;pointer-events:none;}

  /* METER */
  #meter{position:fixed;right:12px;top:50%;transform:translateY(-50%);width:4px;height:100px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;z-index:50;pointer-events:none;}
  #mfill{position:absolute;bottom:0;left:0;right:0;height:0%;transition:height .08s ease;border-radius:4px;}
</style>
</head>
<body>

<div id="splash">
  <div class="ico" id="splashIco">⚡</div>
  <h1 id="splashTitle" style="color:#00f5ff;text-shadow:0 0 20px #00f5ff">GAMING HANDS</h1>
  <div class="tag" id="splashTag" style="color:#00f5ff">ELECTRIC EDITION — PUBG MOBILE</div>
  <p>Point camera at your hands. <strong style="color:#00f5ff">Pinch thumb + index = EXPLOSION.</strong> Switch modes below.</p>
  <div class="btn-row">
    <button class="cam-btn sel" id="btnBack">📷 BACK CAM</button>
    <button class="cam-btn" id="btnFront">🤳 FRONT CAM</button>
  </div>
  <button id="startBtn">⚡ ACTIVATE</button>
</div>

<div id="loader">
  <div id="lmsg" style="color:#00f5ff">LOADING…</div>
  <div id="ltrack"><div id="lfill" style="background:linear-gradient(90deg,#00f5ff,#fff)"></div></div>
</div>

<div id="hud">
  <div id="logo" style="color:#00f5ff;text-shadow:0 0 8px #00f5ff">⚡ GAMING HANDS<small>ELECTRIC EDITION</small></div>
  <button id="camToggle" style="color:rgba(0,245,255,.4);border-color:rgba(0,245,255,.2)">🔄 FLIP</button>
</div>

<div id="modebar">
  <button class="modeBtn active" id="m0" title="Electric" style="border-color:#00f5ff;box-shadow:0 0 10px rgba(0,245,255,.4)">⚡</button>
  <button class="modeBtn" id="m1" title="Fire">🔥</button>
  <button class="modeBtn" id="m2" title="Magic">🔮</button>
  <button class="modeBtn" id="m3" title="Blood">🩸</button>
  <button class="modeBtn" id="m4" title="Rainbow">🌈</button>
</div>

<div id="meter"><div id="mfill"></div></div>
<div id="hint">PINCH THUMB+INDEX = EXPLOSION · TAP MODE BUTTONS BELOW</div>
<canvas id="c"></canvas>
<video id="vid" autoplay playsinline muted></video>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ── MODES ────────────────────────────────────────────────────
const MODES = [
  {
    name:'ELECTRIC', icon:'⚡', bg:'#000',
    c1:[0,245,255], c2:[160,235,255], c3:[255,255,255], c4:[0,160,255],
    hudColor:'#00f5ff', meterGrad:'#00f5ff,#fff',
    boltChance:.35, sparkChance:.4,
  },
  {
    name:'FIRE', icon:'🔥', bg:'#0a0200',
    c1:[255,80,0], c2:[255,180,0], c3:[255,240,100], c4:[200,30,0],
    hudColor:'#ff5000', meterGrad:'#ff3000,#ffcc00',
    boltChance:.15, sparkChance:.55,
  },
  {
    name:'MAGIC', icon:'🔮', bg:'#05000f',
    c1:[180,0,255], c2:[255,0,200], c3:[200,180,255], c4:[100,0,200],
    hudColor:'#cc00ff', meterGrad:'#8800ff,#ff00cc',
    boltChance:.4, sparkChance:.38,
  },
  {
    name:'BLOOD', icon:'🩸', bg:'#080000',
    c1:[220,0,30], c2:[255,60,60], c3:[255,180,180], c4:[140,0,10],
    hudColor:'#dd0020', meterGrad:'#aa0010,#ff4444',
    boltChance:.1, sparkChance:.5,
  },
  {
    name:'RAINBOW', icon:'🌈', bg:'#000',
    c1:null, c2:null, c3:[255,255,255], c4:null, // dynamic
    hudColor:'#fff', meterGrad:'#ff0000,#00ffff',
    boltChance:.3, sparkChance:.45,
  },
];

let modeIdx = 0;
function getMode(){ return MODES[modeIdx]; }
function rainbowColor(offset){
  const h=(Date.now()*.05+offset)%360;
  const r=Math.round(127+127*Math.sin(h*Math.PI/180));
  const g=Math.round(127+127*Math.sin((h+120)*Math.PI/180));
  const b=Math.round(127+127*Math.sin((h+240)*Math.PI/180));
  return [r,g,b];
}
function modeC1(off=0){ return getMode().c1||rainbowColor(off); }
function modeC2(off=60){ return getMode().c2||rainbowColor(off); }
function modeC4(off=120){ return getMode().c4||rainbowColor(off); }

// ── CONSTS ───────────────────────────────────────────────────
const TIPS=[4,8,12,16,20];
const CONNS=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
const MAX_P=120;
const PINCH_DIST=40; // px threshold for thumb+index pinch

// ── STATE ────────────────────────────────────────────────────
let canvas,ctx,vidEl,landmarker,camStream;
let W,H,fr=0,lastT=-1;
let handArr=[];
let particles=[],bolts=[],trails={},prevPos={};
let pinchCooldown={};
let intensity=0,animOn=false,renderBusy=false,useFront=false;

const rg=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;
const lC=(a,b,f)=>a.map((v,i)=>v+(b[i]-v)*f);
const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const rn=(a,b)=>a+Math.random()*(b-a);
const dist=(a,b)=>Math.hypot(a[0]-b[0],a[1]-b[1]);

// ── PARTICLES ────────────────────────────────────────────────
class Spark{
  constructor(x,y,vx,vy,col){
    this.x=x;this.y=y;
    this.vx=vx??rn(-4,4);this.vy=vy??rn(-5,1);
    this.col=col??modeC1();this.r=rn(1,3.5);
    this.life=1;this.decay=rn(.02,.042);
  }
  step(){this.x+=this.vx;this.y+=this.vy;this.vy+=.1;this.vx*=.95;this.life-=this.decay;}
  show(){
    ctx.save();ctx.shadowBlur=12;ctx.shadowColor=rg(this.col,this.life);
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2);
    ctx.fillStyle=rg(this.col,this.life);ctx.fill();ctx.restore();
  }
  get dead(){return this.life<=0;}
}

class Bolt{
  constructor(x1,y1,x2,y2,col){
    this.col=col||modeC1();this.life=1;this.decay=.09+Math.random()*.07;
    this.pts=this._make(x1,y1,x2,y2,4);
  }
  _make(x1,y1,x2,y2,d){
    if(d===0)return [{x:x1,y:y1},{x:x2,y:y2}];
    const len=Math.hypot(x2-x1,y2-y1);
    const mx=(x1+x2)/2+(Math.random()-.5)*len*.4;
    const my=(y1+y2)/2+(Math.random()-.5)*len*.4;
    return [...this._make(x1,y1,mx,my,d-1),...this._make(mx,my,x2,y2,d-1)];
  }
  step(){this.life-=this.decay;}
  show(){
    if(this.life<=0)return;
    ctx.save();ctx.shadowBlur=18*this.life;ctx.shadowColor=rg(this.col,this.life);
    ctx.strokeStyle=rg(this.col,this.life);ctx.lineWidth=1.5*this.life;ctx.lineCap='round';
    ctx.beginPath();this.pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
    ctx.stroke();ctx.restore();
  }
  get dead(){return this.life<=0;}
}

function addSparks(x,y,n,spd){
  if(particles.length>=MAX_P)return;
  const cnt=Math.min(n,MAX_P-particles.length);
  for(let i=0;i<cnt;i++){
    const a=Math.random()*Math.PI*2,s=(1.5+Math.random()*5)*spd;
    const c=modeIdx===4?rainbowColor(i*30):
             i%3===0?modeC1():i%3===1?modeC2():getMode().c3;
    particles.push(new Spark(x,y,Math.cos(a)*s,Math.sin(a)*s,c));
  }
}

function bigBoom(x,y){
  // Large explosion for pinch
  if(particles.length>=MAX_P)return;
  const cnt=Math.min(40,MAX_P-particles.length);
  for(let i=0;i<cnt;i++){
    const a=(i/cnt)*Math.PI*2;
    const s=3+Math.random()*9;
    const c=modeIdx===4?rainbowColor(i*9):
             i%4===0?getMode().c3:i%4===1?modeC1():i%4===2?modeC2():modeC4();
    particles.push(new Spark(x,y,Math.cos(a)*s,Math.sin(a)*s,c));
  }
  // Flash bolts
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2,len=40+Math.random()*80;
    if(bolts.length<30) bolts.push(new Bolt(x,y,x+Math.cos(a)*len,y+Math.sin(a)*len,modeC1(i*20)));
  }
}

function addBolt(x1,y1,x2,y2,col){
  if(bolts.length<28) bolts.push(new Bolt(x1,y1,x2,y2,col||modeC1()));
}

// ── DRAW HAND ────────────────────────────────────────────────
function drawHand(kps,spd){
  const g=cl(spd/18,0,1);
  const bc=lC(modeC4(),modeC1(),g);
  const tc=lC(modeC1(),getMode().c3,g);

  // Skeleton
  ctx.save();
  ctx.shadowBlur=7+g*22;ctx.shadowColor=rg(bc,.7);
  ctx.strokeStyle=rg(bc,.3+g*.5);ctx.lineWidth=1.5+g*2;ctx.lineCap='round';
  CONNS.forEach(([a,b])=>{
    ctx.beginPath();ctx.moveTo(kps[a][0],kps[a][1]);ctx.lineTo(kps[b][0],kps[b][1]);ctx.stroke();
  });
  ctx.restore();

  // Joints + fingertip orbs
  kps.forEach(([x,y],i)=>{
    const isTip=TIPS.includes(i);
    const col=isTip?tc:bc;
    const r=isTip?5+g*8:2.5+g*3;
    ctx.save();
    ctx.shadowBlur=isTip?22+g*18:8+g*10;ctx.shadowColor=rg(col,.9);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=rg(col,.22+g*.32);ctx.fill();
    ctx.shadowBlur=6;ctx.shadowColor=rg(getMode().c3,.9);
    ctx.beginPath();ctx.arc(x,y,isTip?3+g*3:1.5,0,Math.PI*2);ctx.fillStyle=rg(getMode().c3,.88);ctx.fill();
    if(isTip){
      const pr=r+2+Math.sin(fr*.15+i)*3;
      ctx.shadowBlur=12+g*14;ctx.shadowColor=rg(modeC1(),.8*g);
      ctx.beginPath();ctx.arc(x,y,pr,0,Math.PI*2);
      ctx.strokeStyle=rg(modeC1(),g*.55);ctx.lineWidth=1+g;ctx.stroke();
    }
    ctx.restore();
  });

  // Palm glow
  const[wx,wy]=kps[0];
  const pr=9+g*14+Math.sin(fr*.1)*3;
  ctx.save();ctx.shadowBlur=22+g*22;ctx.shadowColor=rg(modeC1(),.8);
  ctx.beginPath();ctx.arc(wx,wy,pr,0,Math.PI*2);ctx.fillStyle=rg(modeC1(),.12+g*.18);ctx.fill();
  ctx.shadowBlur=8;ctx.shadowColor=rg(getMode().c3,.9);
  ctx.beginPath();ctx.arc(wx,wy,4+g*4,0,Math.PI*2);ctx.fillStyle=rg(getMode().c3,.85);ctx.fill();
  ctx.restore();

  // Inter-finger lightning
  if(g>getMode().boltChance&&Math.random()<.3){
    const i1=TIPS[Math.floor(Math.random()*5)];
    const i2=TIPS[Math.floor(Math.random()*5)];
    if(i1!==i2) addBolt(kps[i1][0],kps[i1][1],kps[i2][0],kps[i2][1],modeC1(Math.random()*120));
  }
}

function drawTrail(id,x,y,spd){
  if(!trails[id])trails[id]=[];
  trails[id].push({x,y});
  if(trails[id].length>14)trails[id].shift();
  const g=cl(spd/18,0,1);
  trails[id].forEach((pt,i)=>{
    const f=i/trails[id].length;
    const a=f*g*.4,r=f*5*g;
    if(r<.4||a<.02)return;
    ctx.save();ctx.shadowBlur=8;ctx.shadowColor=rg(modeC1(i*10),a);
    ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);ctx.fillStyle=rg(modeC1(i*10),a);ctx.fill();ctx.restore();
  });
}

// ── PINCH DETECTION ──────────────────────────────────────────
function checkPinch(kps,handId){
  const thumb=kps[4], index=kps[8];
  const d=dist(thumb,index);
  const k=`pinch_${handId}`;
  if(!pinchCooldown[k])pinchCooldown[k]=0;
  if(d<PINCH_DIST&&pinchCooldown[k]<=0){
    const mx=(thumb[0]+index[0])/2;
    const my=(thumb[1]+index[1])/2;
    bigBoom(mx,my);
    pinchCooldown[k]=55;
  }
  if(pinchCooldown[k]>0)pinchCooldown[k]--;
}

// ── DETECT ───────────────────────────────────────────────────
let lastDetect=-1;
function detectLoop(){
  if(!animOn)return;
  if(vidEl.currentTime!==lastDetect&&vidEl.readyState>=2){
    lastDetect=vidEl.currentTime;
    try{
      const res=landmarker.detectForVideo(vidEl,performance.now());
      handArr=[];
      if(res.landmarks?.length){
        res.landmarks.forEach((lms,i)=>{
          const kps=lms.map(lm=>[useFront?(1-lm.x)*W:lm.x*W,lm.y*H]);
          handArr.push({kps,id:i});
        });
      }
    }catch(e){}
  }
  requestAnimationFrame(detectLoop);
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  if(!animOn||renderBusy)return;
  renderBusy=true;fr++;
  try{
    // Background
    ctx.fillStyle=getMode().bg;ctx.fillRect(0,0,W,H);

    // Grid every 3 frames
    if(fr%3===0){
      ctx.save();ctx.globalAlpha=.016;ctx.strokeStyle=`rgb(${getMode().c1||[255,255,255]})`;ctx.lineWidth=.5;
      for(let x=0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      ctx.restore();
    }

    // Video silhouette
    if(vidEl.readyState>=2){
      try{
        ctx.save();ctx.globalAlpha=.16;ctx.filter='saturate(0) brightness(.28) sepia(1) hue-rotate(185deg)';
        if(useFront){ctx.translate(W,0);ctx.scale(-1,1);}
        ctx.drawImage(vidEl,0,0,W,H);ctx.restore();
      }catch(e){}
    }

    let totalSpd=0;
    handArr.forEach(({kps,id})=>{
      const w=kps[0];
      const prev=prevPos[id];
      let spd=0;
      if(prev){
        spd=Math.hypot(w[0]-prev.x,w[1]-prev.y);
        totalSpd+=spd;
        if(spd>10&&particles.length<MAX_P){
          addSparks(w[0],w[1],Math.floor(spd/5),1);
          if(spd>22) TIPS.forEach(tid=>{if(Math.random()<getMode().sparkChance)addSparks(kps[tid][0],kps[tid][1],2,1.2);});
        }
        if(spd>26&&Math.random()<.5) addBolt(w[0],w[1],kps[TIPS[Math.floor(Math.random()*5)]][0],kps[TIPS[Math.floor(Math.random()*5)]][1]);
      }
      prevPos[id]={x:w[0],y:w[1]};
      TIPS.forEach(tid=>drawTrail(`${id}_${tid}`,kps[tid][0],kps[tid][1],spd));
      drawHand(kps,spd);
      checkPinch(kps,id);
    });

    if(!handArr.length)Object.keys(prevPos).forEach(k=>delete prevPos[k]);
    if(handArr.length===2&&Math.random()<.08*intensity){
      addBolt(handArr[0].kps[0][0],handArr[0].kps[0][1],handArr[1].kps[0][0],handArr[1].kps[0][1]);
    }

    intensity=cl(intensity*.88+(totalSpd/280)*.12*Math.max(handArr.length,1),0,1);
    document.getElementById('mfill').style.height=(intensity*100)+'%';

    bolts=bolts.filter(b=>!b.dead);bolts.forEach(b=>{b.step();b.show();});
    particles=particles.filter(p=>!p.dead);particles.forEach(p=>{p.step();p.show();});
  }catch(e){console.error(e);}
  renderBusy=false;requestAnimationFrame(render);
}

// ── MODE SWITCH ──────────────────────────────────────────────
function applyMode(){
  const m=getMode();
  const hc=m.hudColor;
  document.getElementById('logo').style.color=hc;
  document.getElementById('logo').style.textShadow=`0 0 8px ${hc}`;
  document.getElementById('lmsg').style.color=hc;
  document.getElementById('lfill').style.background=`linear-gradient(90deg,${m.meterGrad})`;
  document.getElementById('mfill').style.background=`linear-gradient(0deg,${m.meterGrad})`;
  document.getElementById('mfill').style.boxShadow=`0 0 8px ${hc}`;

  // Update mode buttons
  MODES.forEach((_,i)=>{
    const btn=document.getElementById(`m${i}`);
    btn.classList.toggle('active',i===modeIdx);
    btn.style.borderColor = i===modeIdx ? hc : 'rgba(255,255,255,.12)';
    btn.style.boxShadow   = i===modeIdx ? `0 0 12px ${hc}88` : 'none';
  });

  // Clear old particles/bolts on mode change
  particles=[];bolts=[];
}

document.querySelectorAll('.modeBtn').forEach((btn,i)=>{
  btn.addEventListener('click',()=>{modeIdx=i;applyMode();});
});

// ── CAMERA ───────────────────────────────────────────────────
async function startCam(){
  if(camStream)camStream.getTracks().forEach(t=>t.stop());
  camStream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:useFront?'user':'environment',width:{ideal:640},height:{ideal:480}},audio:false
  });
  vidEl.srcObject=camStream;
  await new Promise(r=>{vidEl.onloadeddata=r;setTimeout(r,3000);});
}

document.getElementById('camToggle').addEventListener('click',async()=>{useFront=!useFront;await startCam();});
document.getElementById('btnBack').addEventListener('click',()=>{useFront=false;document.getElementById('btnBack').classList.add('sel');document.getElementById('btnFront').classList.remove('sel');});
document.getElementById('btnFront').addEventListener('click',()=>{useFront=true;document.getElementById('btnFront').classList.add('sel');document.getElementById('btnBack').classList.remove('sel');});

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}

// ── BOOT ─────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click',async()=>{
  document.getElementById('splash').classList.add('gone');
  document.getElementById('loader').classList.add('show');
  const fill=document.getElementById('lfill'),msg=document.getElementById('lmsg');
  canvas=document.getElementById('c');ctx=canvas.getContext('2d');
  vidEl=document.getElementById('vid');resize();
  window.addEventListener('resize',resize);
  applyMode();

  let prog=0;
  const tick=setInterval(()=>{prog=Math.min(prog+Math.random()*5,80);fill.style.width=prog+'%';},300);

  msg.textContent='ACCESSING CAMERA…';
  try{await startCam();}
  catch(e){msg.textContent='CAMERA BLOCKED — ALLOW IN SAFARI SETTINGS';clearInterval(tick);return;}

  msg.textContent='LOADING CORE…';
  try{
    const vision=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
    fill.style.width='60%';msg.textContent='CHARGING NEURAL MESH…';
    landmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'GPU'},
      runningMode:'VIDEO',numHands:2,
      minHandDetectionConfidence:.5,minHandPresenceConfidence:.5,minTrackingConfidence:.5,
    });
    clearInterval(tick);fill.style.width='100%';
    await new Promise(r=>setTimeout(r,400));
    document.getElementById('loader').classList.remove('show');
    animOn=true;detectLoop();render();
  }catch(e){clearInterval(tick);msg.textContent='ERROR: '+e.message;}
});
</script>
</body>
