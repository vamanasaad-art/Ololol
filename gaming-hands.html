<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GAMING HANDS</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; touch-action:none; -webkit-user-select:none; font-family:'Courier New',monospace; }
  #c { position:fixed; inset:0; width:100%; height:100%; z-index:1; }
  #vid { position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; }

  #splash {
    position:fixed; inset:0;
    background:radial-gradient(ellipse at 50% 60%, #050510 0%, #000 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; z-index:200;
    padding:env(safe-area-inset-top,20px) 32px env(safe-area-inset-bottom,20px);
    transition:opacity 0.7s;
  }
  #splash.gone{opacity:0;pointer-events:none;}
  .ico{font-size:56px;animation:bob 2s ease-in-out infinite;filter:drop-shadow(0 0 20px #00f5ff);}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  #splash h1{font-size:clamp(26px,8vw,46px);font-weight:900;letter-spacing:.1em;color:#00f5ff;text-shadow:0 0 20px #00f5ff,0 0 60px rgba(0,245,255,.4);text-align:center;line-height:1.1;}
  #splash h1 span{color:#fff;text-shadow:0 0 20px #fff,0 0 40px rgba(255,255,255,.4);}
  .tag{font-size:10px;letter-spacing:.4em;color:rgba(0,245,255,.6);text-align:center;}
  #splash p{font-size:12px;line-height:1.9;color:rgba(255,255,255,.4);text-align:center;max-width:280px;}
  #splash p strong{color:#00f5ff;}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
  .cam-btn{background:transparent;border:1px solid rgba(0,245,255,.25);color:rgba(0,245,255,.5);font-family:'Courier New',monospace;font-size:11px;font-weight:700;letter-spacing:.18em;padding:10px 18px;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent;transition:all .2s;border-radius:2px;}
  .cam-btn.sel{background:rgba(0,245,255,.1);border-color:#00f5ff;color:#00f5ff;box-shadow:0 0 14px rgba(0,245,255,.3);}
  #startBtn{background:transparent;border:1.5px solid #00f5ff;color:#00f5ff;font-family:'Courier New',monospace;font-size:13px;font-weight:700;letter-spacing:.28em;padding:15px 44px;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent;box-shadow:0 0 24px rgba(0,245,255,.2),inset 0 0 16px rgba(0,245,255,.05);transition:all .2s;margin-top:6px;}
  #startBtn:active{background:rgba(0,245,255,.1);transform:scale(.97);}

  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:calc(env(safe-area-inset-top,0px)+12px) 14px 0;z-index:50;pointer-events:none;}
  #logo{font-size:11px;font-weight:900;letter-spacing:.18em;color:#00f5ff;text-shadow:0 0 8px #00f5ff;line-height:1.4;}
  #logo small{display:block;font-size:8px;letter-spacing:.28em;color:rgba(0,245,255,.45);}
  #camToggle{font-size:9px;letter-spacing:.1em;padding:5px 10px;border:1px solid rgba(0,245,255,.2);border-radius:20px;color:rgba(0,245,255,.45);background:rgba(0,0,0,.4);cursor:pointer;-webkit-tap-highlight-color:transparent;pointer-events:all;transition:all .2s;}
  #camToggle:active{border-color:#00f5ff;color:#00f5ff;}

  #hint{position:fixed;bottom:calc(env(safe-area-inset-bottom,8px)+6px);left:0;right:0;text-align:center;font-size:9px;letter-spacing:.18em;color:rgba(0,245,255,.16);text-transform:uppercase;z-index:50;pointer-events:none;}

  #loader{position:fixed;inset:0;background:rgba(0,0,0,.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:300;}
  #loader.show{display:flex;}
  #lmsg{font-size:11px;letter-spacing:.26em;color:#00f5ff;text-shadow:0 0 8px #00f5ff;animation:blink 1s infinite;text-align:center;max-width:280px;line-height:1.9;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  #ltrack{width:200px;height:2px;background:rgba(0,245,255,.1);border-radius:2px;overflow:hidden;}
  #lfill{height:100%;background:linear-gradient(90deg,#00f5ff,#fff,#00f5ff);width:0%;transition:width .3s ease;}

  #meter{position:fixed;right:12px;top:50%;transform:translateY(-50%);width:4px;height:100px;background:rgba(0,245,255,.06);border-radius:4px;overflow:hidden;z-index:50;pointer-events:none;}
  #mfill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#00f5ff,#fff);box-shadow:0 0 8px #00f5ff;height:0%;transition:height .08s ease;}
</style>
</head>
<body>

<div id="splash">
  <div class="ico">⚡</div>
  <h1>GAMING <span>HANDS</span></h1>
  <div class="tag">ELECTRIC EDITION — PUBG MOBILE</div>
  <p>Point camera at your hands while playing. <strong>Move fast = lightning bursts. Tap fast = power surge.</strong></p>
  <div class="btn-row">
    <button class="cam-btn sel" id="btnBack">📷 BACK CAM</button>
    <button class="cam-btn" id="btnFront">🤳 FRONT CAM</button>
  </div>
  <button id="startBtn">⚡ ACTIVATE POWER</button>
</div>

<div id="loader"><div id="lmsg">LOADING…</div><div id="ltrack"><div id="lfill"></div></div></div>

<div id="hud">
  <div id="logo">⚡ GAMING HANDS<small>ELECTRIC EDITION</small></div>
  <button id="camToggle">🔄 FLIP CAM</button>
</div>
<div id="meter"><div id="mfill"></div></div>
<div id="hint">MOVE FAST FOR LIGHTNING · TAP FAST FOR POWER SURGE</div>
<canvas id="c"></canvas>
<video id="vid" autoplay playsinline muted></video>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const C1=[0,245,255],C2=[160,235,255],C3=[255,255,255],C4=[0,160,255],C5=[100,210,255];
const TIPS=[4,8,12,16,20];
const CONNS=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
const MAX_P=100;

let canvas,ctx,vidEl,landmarker,camStream;
let W,H,fr=0,lastT=-1;
let handArr=[];
let particles=[],bolts=[],trails={},prevPos={};
let intensity=0,animOn=false,renderBusy=false,useFront=false;

const rg=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;
const lC=(a,b,f)=>a.map((v,i)=>v+(b[i]-v)*f);
const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const rn=(a,b)=>a+Math.random()*(b-a);

// Spark particle
class Spark{
  constructor(x,y,vx,vy,col){
    this.x=x;this.y=y;this.vx=vx??rn(-4,4);this.vy=vy??rn(-5,1);
    this.col=col??C1;this.r=rn(1,3);this.life=1;this.decay=rn(.022,.045);
  }
  step(){this.x+=this.vx;this.y+=this.vy;this.vy+=.1;this.vx*=.95;this.life-=this.decay;}
  show(){
    ctx.save();ctx.shadowBlur=10;ctx.shadowColor=rg(this.col,this.life);
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2);
    ctx.fillStyle=rg(this.col,this.life);ctx.fill();ctx.restore();
  }
  get dead(){return this.life<=0;}
}

// Lightning segment
class Bolt{
  constructor(x1,y1,x2,y2){
    this.col=Math.random()>.4?C1:C3;
    this.life=1;this.decay=.1+Math.random()*.08;
    this.pts=this._make(x1,y1,x2,y2,4);
  }
  _make(x1,y1,x2,y2,d){
    if(d===0)return [{x:x1,y:y1},{x:x2,y:y2}];
    const len=Math.hypot(x2-x1,y2-y1);
    const mx=(x1+x2)/2+(Math.random()-.5)*len*.4;
    const my=(y1+y2)/2+(Math.random()-.5)*len*.4;
    return [...this._make(x1,y1,mx,my,d-1),...this._make(mx,my,x2,y2,d-1)];
  }
  step(){this.life-=this.decay;}
  show(){
    if(this.life<=0)return;
    ctx.save();ctx.shadowBlur=18*this.life;ctx.shadowColor=rg(this.col,this.life);
    ctx.strokeStyle=rg(this.col,this.life);ctx.lineWidth=1.2*this.life;ctx.lineCap='round';
    ctx.beginPath();this.pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
    ctx.stroke();ctx.restore();
  }
  get dead(){return this.life<=0;}
}

function addSparks(x,y,n,spd){
  if(particles.length>=MAX_P)return;
  const cols=[C1,C2,C3,C4,C5];
  const count=Math.min(n,MAX_P-particles.length);
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=(1.5+Math.random()*5)*spd;
    particles.push(new Spark(x,y,Math.cos(a)*s,Math.sin(a)*s,cols[i%5]));
  }
}

function addBolt(x1,y1,x2,y2){
  if(bolts.length<25) bolts.push(new Bolt(x1,y1,x2,y2));
}

function drawHand(kps,spd){
  const g=cl(spd/18,0,1);
  const bc=lC(C4,C1,g), tc=lC(C1,C3,g);

  // Skeleton
  ctx.save();
  ctx.shadowBlur=7+g*22;ctx.shadowColor=rg(bc,.7);
  ctx.strokeStyle=rg(bc,.3+g*.5);ctx.lineWidth=1.5+g*2;ctx.lineCap='round';
  CONNS.forEach(([a,b])=>{
    ctx.beginPath();ctx.moveTo(kps[a][0],kps[a][1]);ctx.lineTo(kps[b][0],kps[b][1]);ctx.stroke();
  });
  ctx.restore();

  // Joints
  kps.forEach(([x,y],i)=>{
    const isTip=TIPS.includes(i);
    const r=isTip?5+g*8:2.5+g*3;
    const col=isTip?tc:bc;
    ctx.save();ctx.shadowBlur=isTip?22+g*20:8+g*12;ctx.shadowColor=rg(col,.9);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=rg(col,.25+g*.35);ctx.fill();
    ctx.shadowBlur=8;ctx.shadowColor=rg(C3,.9);
    ctx.beginPath();ctx.arc(x,y,isTip?3+g*3:1.5,0,Math.PI*2);ctx.fillStyle=rg(C3,.9);ctx.fill();
    // Pulse ring on tips
    if(isTip){
      const pr=r+2+Math.sin(fr*.15+i)*3;
      ctx.shadowBlur=12+g*16;ctx.shadowColor=rg(C1,g*.8);
      ctx.beginPath();ctx.arc(x,y,pr,0,Math.PI*2);
      ctx.strokeStyle=rg(C1,g*.6);ctx.lineWidth=1+g;ctx.stroke();
    }
    ctx.restore();
  });

  // Palm glow
  const[wx,wy]=kps[0];
  const pr=9+g*14+Math.sin(fr*.1)*3;
  ctx.save();ctx.shadowBlur=22+g*24;ctx.shadowColor=rg(C1,.8);
  ctx.beginPath();ctx.arc(wx,wy,pr,0,Math.PI*2);ctx.fillStyle=rg(C1,.12+g*.18);ctx.fill();
  ctx.shadowBlur=8;ctx.shadowColor=rg(C3,.9);
  ctx.beginPath();ctx.arc(wx,wy,4+g*4,0,Math.PI*2);ctx.fillStyle=rg(C3,.85);ctx.fill();
  ctx.restore();

  // Inter-finger bolts at high speed
  if(g>.55&&Math.random()<.35){
    const i1=TIPS[Math.floor(Math.random()*5)];
    const i2=TIPS[Math.floor(Math.random()*5)];
    if(i1!==i2) addBolt(kps[i1][0],kps[i1][1],kps[i2][0],kps[i2][1]);
  }
}

function drawTrail(id,x,y,spd){
  if(!trails[id])trails[id]=[];
  trails[id].push({x,y});
  if(trails[id].length>14)trails[id].shift();
  const g=cl(spd/18,0,1);
  trails[id].forEach((pt,i)=>{
    const f=i/trails[id].length;
    const a=f*g*.45;const r=f*5*g;
    if(r<.4||a<.02)return;
    ctx.save();ctx.shadowBlur=8;ctx.shadowColor=rg(C1,a);
    ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);ctx.fillStyle=rg(C1,a);ctx.fill();ctx.restore();
  });
}

// Detect
function detectLoop(){
  if(!animOn)return;
  if(vidEl.currentTime!==lastT&&vidEl.readyState>=2){
    lastT=vidEl.currentTime;
    try{
      const res=landmarker.detectForVideo(vidEl,performance.now());
      handArr=[];
      if(res.landmarks?.length){
        res.landmarks.forEach((lms,i)=>{
          const kps=lms.map(lm=>[useFront?(1-lm.x)*W:lm.x*W,lm.y*H]);
          handArr.push({kps,id:i});
        });
      }
    }catch(e){}
  }
  requestAnimationFrame(detectLoop);
}

// Render
function render(){
  if(!animOn||renderBusy)return;
  renderBusy=true;fr++;
  try{
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // Subtle grid every 3 frames
    if(fr%3===0){
      ctx.save();ctx.globalAlpha=.016;ctx.strokeStyle='#00f5ff';ctx.lineWidth=.5;
      for(let x=0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      ctx.restore();
    }

    // Video silhouette
    if(vidEl.readyState>=2){
      try{
        ctx.save();ctx.globalAlpha=.16;
        ctx.filter='saturate(0) brightness(.28) sepia(1) hue-rotate(185deg)';
        if(useFront){ctx.translate(W,0);ctx.scale(-1,1);}
        ctx.drawImage(vidEl,0,0,W,H);ctx.restore();
      }catch(e){}
    }

    let totalSpd=0;
    handArr.forEach(({kps,id})=>{
      const w=kps[0];
      const prev=prevPos[id];
      let spd=0;
      if(prev){
        spd=Math.hypot(w[0]-prev.x,w[1]-prev.y);
        totalSpd+=spd;
        if(spd>10&&particles.length<MAX_P){
          addSparks(w[0],w[1],Math.floor(spd/5),1);
          if(spd>22) TIPS.forEach(tid=>{if(Math.random()<.35)addSparks(kps[tid][0],kps[tid][1],2,1.2);});
        }
        if(spd>28&&Math.random()<.5){
          const tip=kps[TIPS[Math.floor(Math.random()*5)]];
          addBolt(w[0],w[1],tip[0],tip[1]);
        }
      }
      prevPos[id]={x:w[0],y:w[1]};
      TIPS.forEach(tid=>drawTrail(`${id}_${tid}`,kps[tid][0],kps[tid][1],spd));
      drawHand(kps,spd);
    });

    if(!handArr.length)Object.keys(prevPos).forEach(k=>delete prevPos[k]);

    // Two-hand lightning
    if(handArr.length===2&&Math.random()<.1*intensity){
      addBolt(handArr[0].kps[0][0],handArr[0].kps[0][1],handArr[1].kps[0][0],handArr[1].kps[0][1]);
    }

    intensity=cl(intensity*.88+(totalSpd/280)*.12*Math.max(handArr.length,1),0,1);
    document.getElementById('mfill').style.height=(intensity*100)+'%';

    bolts=bolts.filter(b=>!b.dead);bolts.forEach(b=>{b.step();b.show();});
    particles=particles.filter(p=>!p.dead);particles.forEach(p=>{p.step();p.show();});
  }catch(e){console.error(e);}
  renderBusy=false;requestAnimationFrame(render);
}

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}

async function startCam(){
  if(camStream)camStream.getTracks().forEach(t=>t.stop());
  camStream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:useFront?'user':'environment',width:{ideal:640},height:{ideal:480}},audio:false
  });
  vidEl.srcObject=camStream;
  await new Promise(r=>{vidEl.onloadeddata=r;setTimeout(r,3000);});
}

document.getElementById('camToggle').addEventListener('click',async()=>{useFront=!useFront;await startCam();});
document.getElementById('btnBack').addEventListener('click',()=>{useFront=false;document.getElementById('btnBack').classList.add('sel');document.getElementById('btnFront').classList.remove('sel');});
document.getElementById('btnFront').addEventListener('click',()=>{useFront=true;document.getElementById('btnFront').classList.add('sel');document.getElementById('btnBack').classList.remove('sel');});

document.getElementById('startBtn').addEventListener('click',async()=>{
  document.getElementById('splash').classList.add('gone');
  document.getElementById('loader').classList.add('show');
  const fill=document.getElementById('lfill'),msg=document.getElementById('lmsg');
  canvas=document.getElementById('c');ctx=canvas.getContext('2d');
  vidEl=document.getElementById('vid');resize();
  window.addEventListener('resize',resize);

  let prog=0;
  const tick=setInterval(()=>{prog=Math.min(prog+Math.random()*5,80);fill.style.width=prog+'%';},300);

  msg.textContent='ACCESSING CAMERA…';
  try{await startCam();}
  catch(e){msg.textContent='CAMERA BLOCKED — ALLOW IN SAFARI SETTINGS';clearInterval(tick);return;}

  msg.textContent='LOADING ELECTRIC CORE…';
  try{
    const vision=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
    fill.style.width='60%';msg.textContent='CHARGING NEURAL MESH…';
    landmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'GPU'},
      runningMode:'VIDEO',numHands:2,
      minHandDetectionConfidence:.5,minHandPresenceConfidence:.5,minTrackingConfidence:.5,
    });
    clearInterval(tick);fill.style.width='100%';
    await new Promise(r=>setTimeout(r,400));
    document.getElementById('loader').classList.remove('show');
    animOn=true;detectLoop();render();
  }catch(e){clearInterval(tick);msg.textContent='ERROR: '+e.message;}
});
</script>
</body>
</html>
