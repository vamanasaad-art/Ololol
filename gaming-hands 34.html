<script>
var _camFront=false;
function selCam(s){ _camFront=s==='front'; document.getElementById('btnBack').className='cbtn'+(_camFront?'':' sel'); document.getElementById('btnFront').className='cbtn'+(_camFront?' sel':''); }
selCam('back');

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const BASE='https://raw.githubusercontent.com/vamanasaad-art/Ololol/main/';

const MODES=[
  { name:'GLACIER', emoji:'🧊', img:'M4%20Glacier.png', c1:[0,245,255],  c2:[100,220,255], c3:[220,250,255], c4:[0,160,210],  hc:'#00f5ff', mg:'#00f5ff,#b0eeff', dotColor:'#00f5ff' },
  { name:'FIRE',    emoji:'🔥', img:'M4%20Fire.png',    c1:[255,140,0],  c2:[255,210,0],   c3:[255,240,120], c4:[200,60,0],   hc:'#ff8c00', mg:'#ff4400,#ffd000', dotColor:'#ff8c00' },
  { name:'JOKER',   emoji:'🃏', img:'M4%20Joker.png',   c1:[160,0,255],  c2:[0,220,80],    c3:[255,100,200], c4:[100,0,180],  hc:'#a000ff', mg:'#7700cc,#00dd55', dotColor:'#a000ff' },
  { name:'LIZARD',  emoji:'🦎', img:'M4%20Lizard.png',  c1:[200,255,0],  c2:[0,80,255],    c3:[255,255,100], c4:[150,200,0],  hc:'#ccff00', mg:'#aaee00,#0055ff', dotColor:'#ccff00' },
  { name:'NETHER',  emoji:'🌌', img:'M4%20Nether.png',  c1:[200,80,255], c2:[80,180,255],  c3:[255,220,255], c4:[140,0,200],  hc:'#cc50ff', mg:'#aa00ff,#5599ff', dotColor:'#cc50ff' },
];

// Preload all images
const m4Imgs=MODES.map(m=>{ const i=new Image(); i.crossOrigin='anonymous'; i.src=BASE+m.img; return i; });

let modeIdx=0;
const M=()=>MODES[modeIdx];
const C1=()=>M().c1;
const C2=()=>M().c2;
const C4=()=>M().c4;

const TIPS=[4,8,12,16,20];
const CONNS=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
const MAX_P=100;

let canvas,ctx,vidEl,landmarker,camStream,audioCtx;
let W,H,fr=0,lastT=-1;
let handArr=[];
let particles=[],bolts=[],trails={},prevPos={};
let swipeHist={},swipeCD=0;
let handAnims=[];
let intensity=0,animOn=false,busy=false,filterOn=false;
let stringMode=false; // clap toggle
let clapCD=0, prevHandDist=null;
let clapFlashTO=null;

// String pairs for cat's cradle effect (fingertip to fingertip)
const TIPS_IDX=[4,8,12,16,20];
const STRING_PAIRS=[
  [[255,0,228],[0,245,255]],
  [[255,242,0],[255,0,228]],
  [[0,245,255],[255,242,0]],
  [[255,0,228],[255,242,0]],
  [[0,245,255],[255,0,228]],
];

const rg=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;
const lC=(a,b,f)=>a.map((v,i)=>v+(b[i]-v)*f);
const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const rn=(a,b)=>a+Math.random()*(b-a);
const d2=(a,b)=>Math.hypot(a[0]-b[0],a[1]-b[1]);

// ── AUDIO ─────────────────────────────────────────────────────
function initAudio(){ if(audioCtx)return; try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} }
function playMode(dir){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime, base=300+modeIdx*80;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);o.type='sine';
    o.frequency.setValueAtTime(dir>0?200:600,t);
    o.frequency.exponentialRampToValueAtTime(dir>0?600:200,t+.12);
    g.gain.setValueAtTime(.15,t);g.gain.linearRampToValueAtTime(0,t+.14);
    o.start(t);o.stop(t+.15);
    [.12,.22].forEach((d,i)=>{
      const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
      o2.connect(g2);g2.connect(audioCtx.destination);o2.type='sine';
      o2.frequency.setValueAtTime(base*(i?1.33:1),t+d);
      g2.gain.setValueAtTime(0,t+d);g2.gain.linearRampToValueAtTime(.18,t+d+.02);
      g2.gain.linearRampToValueAtTime(0,t+d+.18);o2.start(t+d);o2.stop(t+d+.2);
    });
  }catch(e){}
}

// ── PARTICLES ─────────────────────────────────────────────────
class Spark{
  constructor(x,y,vx,vy,col){ this.x=x;this.y=y;this.vx=vx??rn(-4,4);this.vy=vy??rn(-5,1);this.col=col||C1();this.r=rn(1,3);this.life=1;this.decay=rn(.02,.04); }
  step(){ this.x+=this.vx;this.y+=this.vy;this.vy+=.1;this.vx*=.95;this.life-=this.decay; }
  show(){ ctx.save();ctx.shadowBlur=10;ctx.shadowColor=rg(this.col,this.life);ctx.beginPath();ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2);ctx.fillStyle=rg(this.col,this.life);ctx.fill();ctx.restore(); }
  get dead(){ return this.life<=0; }
}
class Bolt{
  constructor(x1,y1,x2,y2,col){ this.col=col||C1();this.life=1;this.decay=.09+Math.random()*.07;this.pts=this._mk(x1,y1,x2,y2,4); }
  _mk(x1,y1,x2,y2,d){ if(!d)return[{x:x1,y:y1},{x:x2,y:y2}];const l=Math.hypot(x2-x1,y2-y1);const mx=(x1+x2)/2+(Math.random()-.5)*l*.4;const my=(y1+y2)/2+(Math.random()-.5)*l*.4;return[...this._mk(x1,y1,mx,my,d-1),...this._mk(mx,my,x2,y2,d-1)]; }
  step(){ this.life-=this.decay; }
  show(){ if(this.life<=0)return;ctx.save();ctx.shadowBlur=14*this.life;ctx.shadowColor=rg(this.col,this.life);ctx.strokeStyle=rg(this.col,this.life);ctx.lineWidth=1.3*this.life;ctx.lineCap='round';ctx.beginPath();this.pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();ctx.restore(); }
  get dead(){ return this.life<=0; }
}
function addSparks(x,y,n,s){ if(particles.length>=MAX_P)return;const cnt=Math.min(n,MAX_P-particles.length);for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2,sp=(1.5+Math.random()*4)*s;const c=i%3===0?C1():i%3===1?C2():M().c3;particles.push(new Spark(x,y,Math.cos(a)*sp,Math.sin(a)*sp,c));} }
function addBolt(x1,y1,x2,y2,c){ if(bolts.length<24)bolts.push(new Bolt(x1,y1,x2,y2,c||C1())); }

// ── SWIPE ─────────────────────────────────────────────────────
function updateSwipe(id,kps){
  if(!swipeHist[id])swipeHist[id]=[];
  swipeHist[id].push({x:kps[5][0],f:fr});
  swipeHist[id]=swipeHist[id].filter(p=>fr-p.f<=18);
  if(swipeCD>0){swipeCD--;return;}
  const h=swipeHist[id];
  if(h.length<6)return;
  const dx=h[h.length-1].x-h[0].x;
  const dy=Math.abs(kps[5][1]-kps[0][1]);
  const adx=Math.abs(dx);
  if(adx<W*.22)return;
  if(adx/h.length<12)return;
  if(adx<dy*1.5)return;
  let rev=0;const dir=Math.sign(dx);
  for(let i=1;i<h.length;i++)if(Math.sign(h[i].x-h[i-1].x)===-dir)rev++;
  if(rev>4)return;
  changeMode(dir);swipeHist[id]=[];swipeCD=50;
}

// ── MODE ──────────────────────────────────────────────────────
let flashTO=null,labelTO=null;
function changeMode(dir){
  modeIdx=(modeIdx+dir+MODES.length)%MODES.length;
  initAudio();playMode(dir);
  applyMode();
  const fl=document.getElementById('flash');
  fl.style.background=M().hc;fl.style.opacity='.18';
  clearTimeout(flashTO);flashTO=setTimeout(()=>fl.style.opacity='0',200);
  const lb=document.getElementById('modeLabel');
  lb.textContent=M().emoji+' '+M().name;lb.style.color=M().hc;
  lb.classList.add('show');clearTimeout(labelTO);labelTO=setTimeout(()=>lb.classList.remove('show'),1800);
  // Spawn M4 at fixed position — centre, upper area
  handAnims.push({x:W/2, y:H*0.25, life:1, scale:0, modeAt:modeIdx});
  particles=[];bolts=[];
}

// ── M4 ANIMATION — smooth pop in/out ─────────────────────────
function drawHandAnims(){
  handAnims=handAnims.filter(a=>a.life>0);
  handAnims.forEach(a=>{
    a.life-=0.008; // ~4 seconds total
    // Smooth ease-in scale: cubic ease
    const t=1-a.life;
    if(t<0.15){
      // Pop in — fast scale up
      a.scale=t/0.15;
    } else if(a.life>0.2){
      // Hold at full size
      a.scale=1;
    } else {
      // Fade out — smooth
      a.scale=a.life/0.2;
    }
    const alpha = a.life>0.2 ? 1 : cl(a.life/0.2,0,1);
    if(alpha<0.02||a.scale<0.01)return;

    const img=m4Imgs[a.modeAt!==undefined?a.modeAt:modeIdx];
    if(!img.complete||img.naturalWidth===0)return;

    const iw=img.naturalWidth, ih=img.naturalHeight;
    const drawW=W*0.78*a.scale;
    const drawH=drawW*(ih/iw);

    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.shadowBlur=28;
    ctx.shadowColor=MODES[a.modeAt].hc;
    ctx.drawImage(img, a.x-drawW/2, a.y-drawH/2, drawW, drawH);
    ctx.restore();
  });
}

function applyMode(){
  const m=M();
  const logo=document.getElementById('logo');
  logo.style.color=m.hc;logo.style.textShadow=`0 0 8px ${m.hc}`;
  document.getElementById('modeName').textContent=m.name;
  document.getElementById('mfill').style.background=`linear-gradient(0deg,${m.mg})`;
  MODES.forEach((_,i)=>{
    const d=document.getElementById(`d${i}`);
    d.classList.toggle('on',i===modeIdx);
    d.style.background=i===modeIdx?m.dotColor:'rgba(255,255,255,.2)';
    d.style.boxShadow=i===modeIdx?`0 0 8px ${m.dotColor}`:'none';
  });
}

// ── DRAW HAND ─────────────────────────────────────────────────
function drawHand(kps,spd){
  const g=cl(spd/18,0,1);
  const bc=lC(C4(),C1(),g), tc=lC(C1(),M().c3,g);
  const wx=kps[0][0], wy=kps[0][1];

  // Skeleton connections
  ctx.save();
  ctx.shadowBlur=7+g*20;ctx.shadowColor=rg(bc,.65);
  ctx.strokeStyle=rg(bc,.28+g*.48);ctx.lineWidth=1.5+g*2;ctx.lineCap='round';
  CONNS.forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(kps[a][0],kps[a][1]);ctx.lineTo(kps[b][0],kps[b][1]);ctx.stroke();});
  ctx.restore();

  // Joints
  kps.forEach(([x,y],i)=>{
    const isTip=TIPS.includes(i);
    const c=isTip?tc:bc, r=isTip?5+g*7:2.5+g*2.5;
    ctx.save();ctx.shadowBlur=isTip?20+g*16:7+g*9;ctx.shadowColor=rg(c,.9);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=rg(c,.22+g*.3);ctx.fill();
    ctx.shadowBlur=4;ctx.shadowColor=rg(M().c3,.9);
    ctx.beginPath();ctx.arc(x,y,isTip?2+g*2:1.4,0,Math.PI*2);ctx.fillStyle=rg(M().c3,.86);ctx.fill();
    if(isTip){
      const pr=r+2+Math.sin(fr*.15+i)*2.5;
      ctx.shadowBlur=10+g*12;ctx.shadowColor=rg(C1(),.7*g);
      ctx.beginPath();ctx.arc(x,y,pr,0,Math.PI*2);ctx.strokeStyle=rg(C1(),g*.5);ctx.lineWidth=.8+g;ctx.stroke();
    }
    ctx.restore();
  });

  // Palm orb
  const pr=8+g*12+Math.sin(fr*.1)*2.5;
  ctx.save();ctx.shadowBlur=20+g*20;ctx.shadowColor=rg(C1(),.75);
  ctx.beginPath();ctx.arc(wx,wy,pr,0,Math.PI*2);ctx.fillStyle=rg(C1(),.1+g*.16);ctx.fill();
  ctx.shadowBlur=7;ctx.shadowColor=rg(M().c3,.9);
  ctx.beginPath();ctx.arc(wx,wy,3.5+g*3.5,0,Math.PI*2);ctx.fillStyle=rg(M().c3,.83);ctx.fill();
  ctx.restore();

  if(g>.4&&Math.random()<.28){
    const i1=TIPS[~~(Math.random()*5)],i2=TIPS[~~(Math.random()*5)];
    if(i1!==i2)addBolt(kps[i1][0],kps[i1][1],kps[i2][0],kps[i2][1],C1());
  }
}

function drawTrail(id,x,y,spd){
  if(!trails[id])trails[id]=[];
  trails[id].push({x,y});if(trails[id].length>14)trails[id].shift();
  const g=cl(spd/18,0,1);
  trails[id].forEach((pt,i)=>{
    const f=i/trails[id].length,a=f*g*.38,r=f*4.5*g;
    if(r<.3||a<.02)return;
    ctx.save();ctx.shadowBlur=7;ctx.shadowColor=rg(C1(),a);
    ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);ctx.fillStyle=rg(C1(),a);ctx.fill();ctx.restore();
  });
}

// ── COORDS ────────────────────────────────────────────────────
function lmToScreen(lm){
  const vw=vidEl.videoWidth||640,vh=vidEl.videoHeight||480;
  const va=vw/vh,sa=W/H;
  let sx,sy,ox=0,oy=0;
  if(va>sa){sy=H/vh;sx=sy;ox=(W-vw*sx)/2;}
  else{sx=W/vw;sy=sx;oy=(H-vh*sy)/2;}
  let x=lm.x*vw*sx+ox;
  let y=lm.y*vh*sy+oy;
  if(_camFront)x=W-x;
  return[x,y];
}

// ── CLAP DETECTION ────────────────────────────────────────────
// Track hand distance history to detect a fast closing motion
let distHistory=[];
function checkClap(){
  if(handArr.length<2){distHistory=[];prevHandDist=null;return;}
  if(clapCD>0){clapCD--;return;}
  const w1=handArr[0].kps[0], w2=handArr[1].kps[0];
  const dist=Math.hypot(w1[0]-w2[0],w1[1]-w2[1]);

  distHistory.push(dist);
  if(distHistory.length>12)distHistory.shift();
  if(distHistory.length<6)return;

  const oldest=distHistory[0];
  const newest=distHistory[distHistory.length-1];
  // Clap: distance dropped by at least 180px quickly
  if(oldest-newest>180 && newest<W*0.35){
    toggleStringMode();
    clapCD=60;
    distHistory=[];
  }
}

function toggleStringMode(){
  stringMode=!stringMode;
  initAudio();playClap();
  // Update button
  const btn=document.getElementById('stringBtn');
  btn.textContent=stringMode?'🌈 STRINGS: ON':'🌈 STRINGS: OFF';
  btn.style.borderColor=stringMode?'#fff':'rgba(255,255,255,.2)';
  btn.style.color=stringMode?'#fff':'rgba(255,255,255,.5)';
  btn.style.boxShadow=stringMode?'0 0 12px rgba(255,255,255,.4)':'none';
  // Label
  const lbl=document.getElementById('clapLabel');
  lbl.textContent=stringMode?'🌈 STRING MODE ON':'🌈 STRING MODE OFF';
  lbl.style.opacity='1';
  clearTimeout(clapFlashTO);
  clapFlashTO=setTimeout(()=>lbl.style.opacity='0',1600);
  const fl=document.getElementById('flash');
  fl.style.background='rgba(255,255,255,1)';fl.style.opacity='.2';
  setTimeout(()=>fl.style.opacity='0',150);
}

function playClap(){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.12,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const src=audioCtx.createBufferSource(),gn=audioCtx.createGain();
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=1200;f.Q.value=0.5;
    src.buffer=buf;src.connect(f);f.connect(gn);gn.connect(audioCtx.destination);
    gn.gain.setValueAtTime(0.4,t);gn.gain.exponentialRampToValueAtTime(0.001,t+.12);
    src.start(t);
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);o.type='sine';
    o.frequency.setValueAtTime(400,t+.05);
    o.frequency.exponentialRampToValueAtTime(1200,t+.25);
    g.gain.setValueAtTime(0,t+.05);g.gain.linearRampToValueAtTime(.15,t+.1);
    g.gain.linearRampToValueAtTime(0,t+.28);o.start(t+.05);o.stop(t+.3);
  }catch(e){}
}

// ── DRAW STRINGS (cat's cradle) — CLEAN LASER BEAMS ──────────
function drawStrings(){
  if(!stringMode||handArr.length<2)return;
  const sorted=[...handArr].sort((a,b)=>a.kps[0][0]-b.kps[0][0]);
  const L=sorted[0].kps, R=sorted[1].kps;

  const palmDist=Math.hypot(L[0][0]-R[0][0],L[0][1]-R[0][1]);
  const stretch=Math.min(1,palmDist/(Math.hypot(W,H)*0.65));
  const thick=Math.max(1.5,4-stretch*2.5);
  const glowSize=Math.max(12,35-stretch*20);

  // Use current mode colors for the beams
  const m=M();
  // 5 beams — each fingertip pair uses a color blend of the mode palette
  const beamColors=[
    [m.c1, m.c2],
    [m.c2, m.c3],
    [m.c1, m.c3],
    [m.c2, m.c1],
    [m.c3, m.c2],
  ];

  TIPS_IDX.forEach((id,i)=>{
    const lp=L[id], rp=R[id];
    const [ca,cb]=beamColors[i];
    const mid=ca.map((v,j)=>Math.round((v+cb[j])/2));
    // Subtle wave for slight elasticity
    const wave=5*(1-stretch)*Math.sin(fr*.04+i*.8);
    const mx=(lp[0]+rp[0])/2+wave;
    const my=(lp[1]+rp[1])/2+wave*.3;

    // 3 passes: wide soft glow, mid glow, bright core
    [[0.06,glowSize*2.5,thick*6],[0.18,glowSize*1.2,thick*2.5],[1,glowSize*.2,thick]].forEach(([a,bl,w])=>{
      const g=ctx.createLinearGradient(lp[0],lp[1],rp[0],rp[1]);
      g.addColorStop(0,rg(ca,a));
      g.addColorStop(.5,rg(mid,a*1.2>1?1:a*1.2));
      g.addColorStop(1,rg(cb,a));
      ctx.save();
      ctx.shadowBlur=bl;
      ctx.shadowColor=rg(mid,Math.min(1,a*2.5));
      ctx.beginPath();
      ctx.moveTo(lp[0],lp[1]);
      ctx.quadraticCurveTo(mx,my,rp[0],rp[1]);
      ctx.strokeStyle=g;
      ctx.lineWidth=w;
      ctx.lineCap='round';
      ctx.stroke();
      ctx.restore();
    });

    // Bright glowing dot at each fingertip
    [lp,rp].forEach(pt=>{
      ctx.save();
      ctx.shadowBlur=20+thick*3;
      ctx.shadowColor=rg(ca,1);
      ctx.beginPath();ctx.arc(pt[0],pt[1],thick*1.8,0,Math.PI*2);
      ctx.fillStyle=rg(ca,.9);ctx.fill();
      ctx.shadowBlur=6;ctx.shadowColor='rgba(255,255,255,.9)';
      ctx.beginPath();ctx.arc(pt[0],pt[1],thick*.7,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.95)';ctx.fill();
      ctx.restore();
    });
  });
}

// ── DETECT ────────────────────────────────────────────────────
function detectLoop(){
  if(!animOn)return;
  if(vidEl.currentTime!==lastT&&vidEl.readyState>=2){
    lastT=vidEl.currentTime;
    try{
      const res=landmarker.detectForVideo(vidEl,performance.now());
      handArr=[];
      res.landmarks?.forEach((lms,i)=>{
        handArr.push({kps:lms.map(lm=>lmToScreen(lm)),id:i});
      });
    }catch(e){}
  }
  requestAnimationFrame(detectLoop);
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  if(!animOn||busy)return;
  busy=true;fr++;
  try{
    ctx.clearRect(0,0,W,H);
    if(filterOn){
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
      if(vidEl.readyState>=2){
        try{
          const vw=vidEl.videoWidth||640,vh=vidEl.videoHeight||480;
          const va=vw/vh,sa=W/H;
          let sx,sy,ox=0,oy=0;
          if(va>sa){sy=H/vh;sx=sy;ox=(W-vw*sx)/2;}
          else{sx=W/vw;sy=sx;oy=(H-vh*sy)/2;}
          const dw=vw*sx,dh=vh*sy;
          ctx.save();ctx.globalAlpha=.22;
          ctx.filter='saturate(0) brightness(.3) sepia(1) hue-rotate(185deg)';
          if(_camFront){ctx.translate(ox+dw,0);ctx.scale(-1,1);ctx.drawImage(vidEl,0,oy,dw,dh);}
          else ctx.drawImage(vidEl,ox,oy,dw,dh);
          ctx.restore();
        }catch(e){}
      }
    }
    ctx.fillStyle='rgba(0,0,0,.08)';ctx.fillRect(0,0,W,H);

    let ts=0;
    handArr.forEach(({kps,id})=>{
      const w=kps[0],prev=prevPos[id];let spd=0;
      if(prev){
        spd=Math.hypot(w[0]-prev.x,w[1]-prev.y);ts+=spd;
        if(spd>10&&particles.length<MAX_P){
          addSparks(w[0],w[1],~~(spd/5),1);
          if(spd>20)TIPS.forEach(t=>{if(Math.random()<.35)addSparks(kps[t][0],kps[t][1],2,1.1);});
        }
        if(spd>25&&Math.random()<.4)addBolt(w[0],w[1],kps[TIPS[~~(Math.random()*5)]][0],kps[TIPS[~~(Math.random()*5)]][1]);
      }
      prevPos[id]={x:w[0],y:w[1]};
      updateSwipe(id,kps);
      TIPS.forEach(t=>drawTrail(`${id}_${t}`,kps[t][0],kps[t][1],spd));
      drawHand(kps,spd);
    });
    if(!handArr.length){Object.keys(prevPos).forEach(k=>delete prevPos[k]);Object.keys(swipeHist).forEach(k=>delete swipeHist[k]);}
    if(handArr.length===2&&Math.random()<.07*intensity)addBolt(handArr[0].kps[0][0],handArr[0].kps[0][1],handArr[1].kps[0][0],handArr[1].kps[0][1]);

    // Clap detection
    checkClap();
    // Draw strings if string mode on
    drawStrings();

    intensity=cl(intensity*.88+(ts/280)*.12*Math.max(handArr.length,1),0,1);
    document.getElementById('mfill').style.height=(intensity*100)+'%';

    drawHandAnims();
    bolts=bolts.filter(b=>!b.dead);bolts.forEach(b=>{b.step();b.show();});
    particles=particles.filter(p=>!p.dead);particles.forEach(p=>{p.step();p.show();});
  }catch(e){console.error(e);}
  busy=false;requestAnimationFrame(render);
}

function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }

// ── CAMERA ────────────────────────────────────────────────────
async function startCam(){
  if(camStream)camStream.getTracks().forEach(t=>t.stop());
  camStream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:_camFront?'user':'environment',width:{ideal:1280},height:{ideal:720}},
    audio:false
  });
  try{
    const track=camStream.getVideoTracks()[0];
    const caps=track.getCapabilities();
    const settings={};
    if(caps.focusMode&&caps.focusMode.includes('manual'))settings.focusMode='manual';
    if(caps.zoom)settings.zoom=caps.zoom.min||1;
    if(Object.keys(settings).length>0)await track.applyConstraints({advanced:[settings]});
  }catch(e){}
  vidEl.srcObject=camStream;
  vidEl.style.transform=_camFront?'scaleX(-1)':'none';
  await new Promise(r=>{vidEl.onloadeddata=r;setTimeout(r,3000);});
}

// ── UI ────────────────────────────────────────────────────────
let uiVisible=true;
window.toggleUI=()=>{
  uiVisible=!uiVisible;
  document.querySelectorAll('.ui-layer').forEach(el=>el.classList.toggle('ui-hidden',!uiVisible));
  const btn=document.getElementById('hideBtn');
  btn.textContent=uiVisible?'👁️':'👁️‍🗨️';
  btn.style.opacity=uiVisible?'1':'0.3';
};
window.toggleStringMode=toggleStringMode;
window.flipCam=async()=>{ _camFront=!_camFront; await startCam(); };
window.toggleFilter=()=>{
  filterOn=!filterOn;
  const b=document.getElementById('filterBtn');
  b.textContent=filterOn?'🎨 FILTER: ON':'🎨 FILTER: OFF';
  if(vidEl)vidEl.style.opacity=filterOn?'0':'1';
};

// ── BOOT ──────────────────────────────────────────────────────
window._doStart=async()=>{
  initAudio();
  const fill=document.getElementById('lfill'),msg=document.getElementById('lmsg');
  canvas=document.getElementById('c');ctx=canvas.getContext('2d');
  vidEl=document.getElementById('vid');resize();
  window.addEventListener('resize',resize);
  applyMode();
  let prog=0;
  const tick=setInterval(()=>{prog=Math.min(prog+Math.random()*5,80);fill.style.width=prog+'%';},300);
  msg.textContent='ACCESSING CAMERA…';
  try{ await startCam(); }
  catch(e){ msg.textContent='CAMERA BLOCKED — ALLOW IN SETTINGS'; clearInterval(tick); return; }
  msg.textContent='LOADING HAND TRACKER…';
  try{
    const vision=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
    fill.style.width='60%'; msg.textContent='CHARGING NEURAL MESH…';
    landmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{ modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate:'GPU' },
      runningMode:'VIDEO', numHands:2,
      minHandDetectionConfidence:.5, minHandPresenceConfidence:.5, minTrackingConfidence:.5,
    });
    clearInterval(tick); fill.style.width='100%';
    await new Promise(r=>setTimeout(r,400));
    document.getElementById('loader').classList.remove('show');
    document.getElementById('app').classList.add('show');
    animOn=true; detectLoop(); render();
  }catch(e){ clearInterval(tick); msg.textContent='ERROR: '+e.message; }
};
if(window._startPending)window._doStart();
</script>
