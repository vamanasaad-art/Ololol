<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CAT'S CRADLE</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root { --cyan:#00f5ff; --magenta:#ff00e4; --yellow:#fff200; }
  html, body {
    width:100%; height:100%; background:#020817;
    overflow:hidden; touch-action:none;
    -webkit-user-select:none; font-family:'Courier New',monospace;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);
    pointer-events:none; z-index:90;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(2,8,23,0.88) 100%);
    pointer-events:none; z-index:89;
  }
  #c { position:fixed; inset:0; width:100%; height:100%; z-index:1; touch-action:none; }

  /* SPLASH */
  #splash {
    position:fixed; inset:0; background:#020817;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:14px; z-index:200;
    padding:env(safe-area-inset-top,20px) 32px env(safe-area-inset-bottom,20px);
    transition:opacity 0.7s;
  }
  #splash.gone { opacity:0; pointer-events:none; }
  .ico { font-size:54px; animation:bob 2.5s ease-in-out infinite; }
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  h1 {
    font-size:clamp(30px,9vw,52px); font-weight:900;
    letter-spacing:.12em; color:var(--cyan);
    text-shadow:0 0 20px var(--cyan),0 0 60px rgba(0,245,255,.3);
    text-align:center;
  }
  .tag { font-size:10px; letter-spacing:.42em; color:var(--magenta); text-shadow:0 0 8px var(--magenta); text-align:center; }
  #splash p {
    font-size:13px; line-height:2; color:rgba(0,245,255,.5);
    text-align:center; max-width:290px; letter-spacing:.05em;
  }
  #splash p strong { color:var(--yellow); text-shadow:0 0 8px var(--yellow); }
  .instruct {
    display:flex; gap:24px; margin-top:4px;
  }
  .inst-item { text-align:center; font-size:10px; letter-spacing:.1em; color:rgba(0,245,255,.35); }
  .inst-item span { display:block; font-size:22px; margin-bottom:6px; }
  #startBtn {
    margin-top:8px; background:transparent;
    border:1.5px solid var(--cyan); color:var(--cyan);
    font-family:'Courier New',monospace; font-size:13px;
    font-weight:700; letter-spacing:.28em; padding:15px 44px;
    -webkit-tap-highlight-color:transparent; cursor:pointer;
    text-transform:uppercase;
    box-shadow:0 0 20px rgba(0,245,255,.15),inset 0 0 16px rgba(0,245,255,.04);
    transition:all .2s;
  }
  #startBtn:active { background:rgba(0,245,255,.1); transform:scale(.97); }

  /* HUD */
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 0;
    z-index:50; pointer-events:none;
  }
  #logo { font-size:12px; font-weight:900; letter-spacing:.2em; color:var(--cyan); text-shadow:0 0 10px var(--cyan); line-height:1.4; }
  #logo small { display:block; font-size:8px; letter-spacing:.32em; color:var(--magenta); text-shadow:0 0 6px var(--magenta); }
  #touchcount {
    font-size:10px; letter-spacing:.15em; color:rgba(0,245,255,.5);
    padding:5px 12px; border:1px solid rgba(0,245,255,.2);
    border-radius:20px; background:rgba(0,245,255,.04);
  }
  #touchcount.active { color:var(--cyan); border-color:var(--cyan); box-shadow:0 0 8px rgba(0,245,255,.2); }

  #hint {
    position:fixed; bottom:calc(env(safe-area-inset-bottom,8px)+8px);
    left:0; right:0; text-align:center;
    font-size:9px; letter-spacing:.22em; color:rgba(0,245,255,.22);
    text-transform:uppercase; z-index:50; pointer-events:none;
  }
</style>
</head>
<body>

<div id="splash">
  <div class="ico">🕸️</div>
  <h1>CAT'S CRADLE</h1>
  <div class="tag">NEON STRING RITUAL — iOS</div>
  <p>Place <strong>up to 5 fingers</strong> on the screen. Strings weave between your left and right hand touches.</p>
  <div class="instruct">
    <div class="inst-item"><span>🤚</span>LEFT<br>HAND</div>
    <div class="inst-item"><span>✨</span>WEAVE<br>STRINGS</div>
    <div class="inst-item"><span>🤚</span>RIGHT<br>HAND</div>
  </div>
  <button id="startBtn">BEGIN RITUAL</button>
</div>

<div id="hud">
  <div id="logo">CAT'S CRADLE<small>NEON STRING RITUAL</small></div>
  <div id="touchcount">TOUCHES: 0</div>
</div>

<canvas id="c"></canvas>
<div id="hint">PLACE BOTH HANDS ON SCREEN · PINCH FINGERTIPS TO DETONATE</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────
const CY=[0,245,255], MG=[255,0,228], YL=[255,242,0];
const SPAIRS=[[CY,MG],[MG,YL],[YL,CY],[CY,YL],[MG,CY]];

// ── STATE ───────────────────────────────────────────────────
let canvas, ctx, W, H, frame=0;
let touches = {}; // id -> {x,y,side}
let particles = [], trails = {}, cooldowns = {};

// ── UTILS ───────────────────────────────────────────────────
function lerpC(a,b,f){return a.map((v,i)=>v+(b[i]-v)*f);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function d2(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function rgba(c,a){return `rgba(${c[0]},${c[1]},${c[2]},${a})`;}

// ── PARTICLE ────────────────────────────────────────────────
class P {
  constructor(x,y,col){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*8;
    Object.assign(this,{x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,
      life:1,decay:.018+Math.random()*.025,r:2+Math.random()*5,col,trail:[]});
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>7)this.trail.shift();
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=.13; this.vx*=.97; this.life-=this.decay;
  }
  get dead(){return this.life<=0;}
}

function boom(x,y){
  [CY,MG,YL,MG,CY,CY,MG].forEach(c=>{
    for(let i=0;i<6;i++) particles.push(new P(x,y,c));
  });
}

// ── DRAW LASER ───────────────────────────────────────────────
function laser(x1,y1,x2,y2,ca,cb,stretch){
  const thick=clamp(4-stretch*2.8,.6,4);
  const glow=clamp(32-stretch*18,6,32);
  const alpha=clamp(1-stretch*.5,.15,1);
  const mid=lerpC(ca,cb,.5);
  const wave=8*(1-stretch)*Math.sin(frame*.04+x1*.007);
  const mx=(x1+x2)/2+wave, my=(y1+y2)/2+wave*.5;

  [[alpha*.08,glow*3,thick*5.5],[alpha*.2,glow*1.4,thick*2.5],[alpha*.9,glow*.3,thick]].forEach(([a,blur,w])=>{
    const g=ctx.createLinearGradient(x1,y1,x2,y2);
    g.addColorStop(0,rgba(ca,a));
    g.addColorStop(.5,rgba(mid,a));
    g.addColorStop(1,rgba(cb,a));
    ctx.save();
    ctx.shadowBlur=blur;
    ctx.shadowColor=rgba(mid,Math.min(1,a*2.5));
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,my,x2,y2);
    ctx.strokeStyle=g;ctx.lineWidth=w;ctx.lineCap='round';ctx.stroke();
    ctx.restore();
  });
}

// ── DRAW FINGER DOT ─────────────────────────────────────────
function dot(x,y,col,r=18){
  // Outer pulse ring
  const pulse=.5+.5*Math.sin(frame*.08);
  ctx.save();
  ctx.shadowBlur=30;ctx.shadowColor=rgba(col,.6);
  ctx.beginPath();ctx.arc(x,y,r+pulse*6,0,Math.PI*2);
  ctx.strokeStyle=rgba(col,.15+pulse*.15);ctx.lineWidth=2;ctx.stroke();
  // Main glow
  ctx.shadowBlur=24;ctx.shadowColor=rgba(col,1);
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=rgba(col,.85);ctx.fill();
  // Bright core
  ctx.shadowBlur=8;ctx.shadowColor='rgba(255,255,255,.9)';
  ctx.beginPath();ctx.arc(x,y,r*.38,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.92)';ctx.fill();
  ctx.restore();
}

// ── DRAW TRAIL ───────────────────────────────────────────────
function drawTrail(id, x, y, col){
  if(!trails[id]) trails[id]=[];
  trails[id].push({x,y});
  if(trails[id].length>12) trails[id].shift();
  trails[id].forEach((pt,i)=>{
    const a=(i/trails[id].length)*.25;
    const r=(i/trails[id].length)*8;
    ctx.save();
    ctx.shadowBlur=10;ctx.shadowColor=rgba(col,a);
    ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);
    ctx.fillStyle=rgba(col,a);ctx.fill();
    ctx.restore();
  });
}

// ── MAIN RENDER ─────────────────────────────────────────────
function render(){
  frame++;
  ctx.clearRect(0,0,W,H);

  // Background
  const bg=ctx.createRadialGradient(W/2,H*.4,0,W/2,H/2,Math.max(W,H)*.85);
  bg.addColorStop(0,'rgba(5,12,38,1)');
  bg.addColorStop(.5,'rgba(3,9,22,1)');
  bg.addColorStop(1,'rgba(2,8,23,1)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Grid
  ctx.save();ctx.globalAlpha=.032;ctx.strokeStyle='#00f5ff';ctx.lineWidth=.5;
  for(let x=0;x<W;x+=56){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=56){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();

  // Separate touches into LEFT and RIGHT by screen half
  const leftTouches  = Object.values(touches).filter(t=>t.x < W/2).slice(0,5);
  const rightTouches = Object.values(touches).filter(t=>t.x >= W/2).slice(0,5);

  // Draw dividing line (subtle)
  if(leftTouches.length>0 || rightTouches.length>0){
    ctx.save();
    ctx.globalAlpha=.06;
    ctx.setLineDash([4,8]);
    ctx.strokeStyle='#00f5ff';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
    ctx.restore();
  }

  // Draw strings between left and right touches
  const count=Math.min(leftTouches.length, rightTouches.length);
  if(count>0){
    for(let i=0;i<count;i++){
      const L=leftTouches[i], R=rightTouches[i];
      const dist=d2(L,R);
      const stretch=clamp(dist/(W*.9),0,1);
      const[ca,cb]=SPAIRS[i%SPAIRS.length];
      laser(L.x,L.y,R.x,R.y,ca,cb,stretch);

      // Collision explosion
      const k=`${L.id}_${R.id}`;
      if(!cooldowns[k])cooldowns[k]=0;
      if(dist<55&&cooldowns[k]<=0){
        boom((L.x+R.x)/2,(L.y+R.y)/2);
        cooldowns[k]=50;
        navigator.vibrate&&navigator.vibrate(30);
      }
      if(cooldowns[k]>0)cooldowns[k]--;
    }

    // Also draw extra strings if one side has more fingers (web pattern)
    if(leftTouches.length>1&&rightTouches.length>0){
      for(let i=1;i<leftTouches.length;i++){
        const L=leftTouches[i];
        const R=rightTouches[0];
        const stretch=clamp(d2(L,R)/(W*.9),0,1);
        laser(L.x,L.y,R.x,R.y,SPAIRS[(i+2)%5][0],SPAIRS[(i+2)%5][1],stretch*.8+.15);
      }
    }
    if(rightTouches.length>1&&leftTouches.length>0){
      for(let i=1;i<rightTouches.length;i++){
        const R=rightTouches[i];
        const L=leftTouches[0];
        const stretch=clamp(d2(L,R)/(W*.9),0,1);
        laser(L.x,L.y,R.x,R.y,SPAIRS[(i+3)%5][0],SPAIRS[(i+3)%5][1],stretch*.8+.15);
      }
    }
  }

  // Draw finger dots and trails
  leftTouches.forEach((t,i)=>{
    const c=lerpC(CY,YL,i*.2);
    drawTrail(t.id,t.x,t.y,c);
    dot(t.x,t.y,c);
  });
  rightTouches.forEach((t,i)=>{
    const c=lerpC(MG,YL,i*.2);
    drawTrail(t.id,t.x,t.y,c);
    dot(t.x,t.y,c);
  });

  // Particles
  particles=particles.filter(p=>!p.dead);
  particles.forEach(p=>{
    p.update();
    p.trail.forEach((pt,i)=>{
      const a=(i/p.trail.length)*p.life*.35;
      ctx.beginPath();ctx.arc(pt.x,pt.y,p.r*(i/p.trail.length)*.7,0,Math.PI*2);
      ctx.fillStyle=rgba(p.col,a);ctx.fill();
    });
    ctx.save();ctx.shadowBlur=16;ctx.shadowColor=rgba(p.col,p.life);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=rgba(p.col,p.life);ctx.fill();ctx.restore();
  });

  // Idle animation — floating orbs when no touches
  const totalTouches=Object.keys(touches).length;
  if(totalTouches===0){
    const t=frame*.012;
    [[W*.3,H*.45,CY],[W*.5,H*.38,MG],[W*.7,H*.45,YL]].forEach(([ox,oy,c],i)=>{
      const x=ox+Math.sin(t+i*2.1)*30;
      const y=oy+Math.cos(t+i*1.7)*20;
      dot(x,y,c,12);
    });
  }

  // HUD
  const tc=document.getElementById('touchcount');
  tc.textContent=`TOUCHES: ${totalTouches}`;
  tc.className=totalTouches>0?'active':'';

  requestAnimationFrame(render);
}

// ── TOUCH HANDLERS ───────────────────────────────────────────
function onTouchStart(e){
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    touches[t.identifier]={id:t.identifier,x:t.clientX,y:t.clientY};
  });
}
function onTouchMove(e){
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    if(touches[t.identifier]){
      touches[t.identifier].x=t.clientX;
      touches[t.identifier].y=t.clientY;
    }
  });
}
function onTouchEnd(e){
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    delete touches[t.identifier];
    delete trails[t.identifier];
  });
}

// ── INIT ────────────────────────────────────────────────────
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('splash').classList.add('gone');
});

canvas=document.getElementById('c');
ctx=canvas.getContext('2d');
resize();
window.addEventListener('resize',resize);

canvas.addEventListener('touchstart',onTouchStart,{passive:false});
canvas.addEventListener('touchmove',onTouchMove,{passive:false});
canvas.addEventListener('touchend',onTouchEnd,{passive:false});
canvas.addEventListener('touchcancel',onTouchEnd,{passive:false});

// Mouse support for desktop testing
canvas.addEventListener('mousedown',e=>{touches[99]={id:99,x:e.clientX,y:e.clientY};});
canvas.addEventListener('mousemove',e=>{if(touches[99]){touches[99].x=e.clientX;touches[99].y=e.clientY;}});
canvas.addEventListener('mouseup',()=>{delete touches[99];delete trails[99];});

render();
</script>
</body>
</html>
