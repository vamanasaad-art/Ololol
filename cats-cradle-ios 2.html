<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CAT'S CRADLE</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --cyan:#00f5ff; --magenta:#ff00e4; --yellow:#fff200; }
  html, body {
    width:100%; height:100%; background:#020817;
    overflow:hidden; touch-action:none;
    -webkit-user-select:none; font-family:'Courier New',monospace;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);
    pointer-events:none; z-index:90;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(2,8,23,0.85) 100%);
    pointer-events:none; z-index:89;
  }
  #c { position:fixed; inset:0; width:100%; height:100%; }
  #vid { position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; }

  #splash {
    position:fixed; inset:0; background:#020817;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; z-index:200;
    padding:env(safe-area-inset-top,20px) 28px env(safe-area-inset-bottom,20px);
    transition:opacity 0.8s;
  }
  #splash.gone{opacity:0;pointer-events:none;}
  .icon{font-size:52px;animation:bob 2.5s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  h1{font-size:clamp(30px,9vw,52px);font-weight:900;letter-spacing:.12em;color:var(--cyan);text-shadow:0 0 20px var(--cyan),0 0 50px rgba(0,245,255,.3);text-align:center;}
  .tag{font-size:10px;letter-spacing:.42em;color:var(--magenta);text-shadow:0 0 8px var(--magenta);text-align:center;}
  #splash p{font-size:13px;line-height:1.9;color:rgba(0,245,255,.5);text-align:center;max-width:280px;letter-spacing:.06em;}
  #splash p strong{color:var(--yellow);text-shadow:0 0 8px var(--yellow);}
  #startBtn{
    margin-top:8px; background:transparent; border:1.5px solid var(--cyan);
    color:var(--cyan); font-family:'Courier New',monospace; font-size:13px;
    font-weight:700; letter-spacing:.3em; padding:15px 42px;
    -webkit-tap-highlight-color:transparent; cursor:pointer; text-transform:uppercase;
    box-shadow:0 0 20px rgba(0,245,255,.15),inset 0 0 20px rgba(0,245,255,.04);
    transition:all .2s;
  }
  #startBtn:active{background:rgba(0,245,255,.1);transform:scale(.97);}

  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 0;z-index:50;pointer-events:none;}
  #logo{font-size:13px;font-weight:900;letter-spacing:.2em;color:var(--cyan);text-shadow:0 0 10px var(--cyan);line-height:1.4;}
  #logo small{display:block;font-size:8px;letter-spacing:.35em;color:var(--magenta);text-shadow:0 0 6px var(--magenta);}
  #pills{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
  .pill{font-size:9px;letter-spacing:.12em;padding:4px 10px;border:1px solid rgba(0,245,255,.15);border-radius:20px;color:rgba(0,245,255,.4);display:flex;align-items:center;gap:5px;}
  .pill.on{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 8px rgba(0,245,255,.2);}
  .led{width:5px;height:5px;border-radius:50%;background:rgba(0,245,255,.2);}
  .pill.on .led{background:var(--cyan);box-shadow:0 0 5px var(--cyan);animation:blink 1.4s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
  #hint{position:fixed;bottom:calc(env(safe-area-inset-bottom,8px)+6px);left:0;right:0;text-align:center;font-size:9px;letter-spacing:.22em;color:rgba(0,245,255,.2);text-transform:uppercase;z-index:50;pointer-events:none;}

  #loader{position:fixed;inset:0;background:rgba(2,8,23,.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:300;}
  #loader.show{display:flex;}
  #lmsg{font-size:11px;letter-spacing:.3em;color:var(--cyan);text-shadow:0 0 8px var(--cyan);animation:blink 1s infinite;}
  #ltrack{width:180px;height:2px;background:rgba(0,245,255,.12);border-radius:2px;overflow:hidden;}
  #lfill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--magenta));box-shadow:0 0 6px var(--cyan);width:0%;transition:width .4s ease;}
</style>
</head>
<body>

<div id="splash">
  <div class="icon">🕸️</div>
  <h1>CAT'S CRADLE</h1>
  <div class="tag">NEON STRING RITUAL — iOS</div>
  <p>Hold iPhone up, raise <strong>both hands</strong> in front of the camera. Fingertips weave glowing laser strings.</p>
  <button id="startBtn">INITIATE SEQUENCE</button>
</div>

<div id="loader">
  <div id="lmsg">LOADING HAND TRACKER…</div>
  <div id="ltrack"><div id="lfill"></div></div>
</div>

<div id="hud">
  <div id="logo">CAT'S CRADLE<small>NEON STRING RITUAL</small></div>
  <div id="pills">
    <div class="pill" id="pcam"><span class="led"></span>CAMERA</div>
    <div class="pill" id="phands"><span class="led"></span>HANDS: <span id="hcount">0</span></div>
  </div>
</div>

<canvas id="c"></canvas>
<video id="vid" autoplay playsinline muted></video>
<div id="hint">TOUCH FINGERTIPS TO DETONATE · SPREAD TO STRETCH</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>

<script>
const TIPS=[4,8,12,16,20];
const CONNS=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
const CY=[0,245,255], MG=[255,0,228], YL=[255,242,0];
const SPAIRS=[[CY,MG],[MG,YL],[YL,CY],[CY,YL],[MG,CY]];

let predictions=[], particles=[], cooldowns={}, frame=0;
let W, H, vidEl;

function lerpC(a,b,f){return a.map((v,i)=>v+(b[i]-v)*f);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function d2(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1]);}

class P {
  constructor(x,y,col){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*7;
    this.x=x;this.y=y;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-1;
    this.life=1;this.decay=0.022+Math.random()*0.028;this.r=2+Math.random()*4;this.col=col;this.trail=[];
  }
  update(){
    this.trail.push([this.x,this.y]);
    if(this.trail.length>6)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;this.vy+=0.14;this.vx*=0.96;this.life-=this.decay;
  }
  get dead(){return this.life<=0;}
}

function boom(x,y){
  [CY,MG,YL,MG,CY].forEach(c=>{for(let i=0;i<8;i++)particles.push(new P(x,y,c));});
}

function parseHands(preds){
  const r={L:null,R:null};
  if(!preds||!preds.length)return r;
  const mapped=preds.map(pred=>{
    const lms=pred.landmarks||pred.keypoints||pred.handKeypoints;
    if(!lms)return null;
    return lms.map(lm=>{
      let x=Array.isArray(lm)?lm[0]:lm.x;
      let y=Array.isArray(lm)?lm[1]:lm.y;
      const vw=vidEl?(vidEl.videoWidth||320):320;
      const vh=vidEl?(vidEl.videoHeight||240):240;
      if(x>1||y>1){x=(1-x/vw)*W;y=(y/vh)*H;}
      else{x=(1-x)*W;y=y*H;}
      return[x,y];
    });
  }).filter(Boolean);

  // Assign left/right by wrist screen position
  mapped.sort((a,b)=>a[0][0]-b[0][0]);
  if(mapped[0])r.L=mapped[0];
  if(mapped[1])r.R=mapped[1];
  return r;
}

function laser(dc,x1,y1,x2,y2,ca,cb,stretch){
  const thick=clamp(3.5-stretch*2.5,.5,3.5);
  const glow=clamp(30-stretch*16,6,30);
  const alpha=clamp(1-stretch*.5,.2,1);
  const mid=lerpC(ca,cb,.5);
  const wave=7*(1-stretch)*Math.sin(frame*.045+x1*.008);
  const mx=(x1+x2)/2+wave,my=(y1+y2)/2+wave*.4;
  [[alpha*.09,glow*2.8,thick*5],[alpha*.22,glow*1.3,thick*2.4],[alpha*.85,glow*.3,thick]].forEach(([a,blur,w])=>{
    const g=dc.createLinearGradient(x1,y1,x2,y2);
    g.addColorStop(0,`rgba(${ca},${a})`);
    g.addColorStop(.5,`rgba(${mid},${a})`);
    g.addColorStop(1,`rgba(${cb},${a})`);
    dc.save();dc.shadowBlur=blur;dc.shadowColor=`rgba(${mid},${Math.min(1,a*2)})`;
    dc.beginPath();dc.moveTo(x1,y1);dc.quadraticCurveTo(mx,my,x2,y2);
    dc.strokeStyle=g;dc.lineWidth=w;dc.lineCap='round';dc.stroke();dc.restore();
  });
}

function skeleton(dc,kps,isR){
  const base=isR?MG:CY;
  CONNS.forEach(([a,b])=>{
    dc.save();dc.shadowBlur=6;dc.shadowColor=`rgba(${base},.3)`;
    dc.beginPath();dc.moveTo(kps[a][0],kps[a][1]);dc.lineTo(kps[b][0],kps[b][1]);
    dc.strokeStyle=`rgba(${base},.2)`;dc.lineWidth=1.2;dc.stroke();dc.restore();
  });
  kps.forEach(([x,y],i)=>{
    const isTip=TIPS.includes(i);
    const c=lerpC(base,YL,(i/20)*.28);
    const r=isTip?5.5:(i===0?6:3);
    dc.save();dc.shadowBlur=isTip?22:10;dc.shadowColor=`rgba(${c},1)`;
    dc.beginPath();dc.arc(x,y,r,0,Math.PI*2);dc.fillStyle=`rgba(${c},1)`;dc.fill();
    dc.shadowBlur=3;dc.shadowColor='rgba(255,255,255,.9)';
    dc.beginPath();dc.arc(x,y,r*.38,0,Math.PI*2);dc.fillStyle='rgba(255,255,255,.88)';dc.fill();
    dc.restore();
  });
}

// p5 sketch
new p5(sk=>{
  sk.setup=()=>{
    const cnv=sk.createCanvas(window.innerWidth,window.innerHeight);
    // Append canvas to body, hide default
    document.body.appendChild(cnv.elt);
    cnv.elt.id='c2';
    cnv.elt.style.cssText='position:fixed;inset:0;width:100%;height:100%;z-index:1;';
    document.getElementById('c').remove();
    W=sk.width;H=sk.height;
  };
  sk.windowResized=()=>{sk.resizeCanvas(window.innerWidth,window.innerHeight);W=sk.width;H=sk.height;};

  sk.draw=()=>{
    frame++;
    const dc=sk.drawingContext;

    // BG
    const bg=dc.createRadialGradient(W/2,H*.4,0,W/2,H/2,Math.max(W,H)*.8);
    bg.addColorStop(0,'rgba(6,14,42,1)');bg.addColorStop(.5,'rgba(3,9,24,1)');bg.addColorStop(1,'rgba(2,8,23,1)');
    dc.fillStyle=bg;dc.fillRect(0,0,W,H);

    // Grid
    dc.save();dc.globalAlpha=.03;dc.strokeStyle='#00f5ff';dc.lineWidth=.5;
    for(let x=0;x<W;x+=54){dc.beginPath();dc.moveTo(x,0);dc.lineTo(x,H);dc.stroke();}
    for(let y=0;y<H;y+=54){dc.beginPath();dc.moveTo(0,y);dc.lineTo(W,y);dc.stroke();}
    dc.restore();

    // Silhouette
    if(vidEl&&vidEl.readyState>=2){
      try{
        dc.save();dc.globalAlpha=.12;dc.filter='saturate(0) brightness(.35) sepia(1) hue-rotate(185deg)';
        dc.translate(W,0);dc.scale(-1,1);dc.drawImage(vidEl,0,0,W,H);dc.restore();
      }catch(e){}
    }

    const hands=parseHands(predictions);

    if(hands.L&&hands.R){
      const stretch=clamp(d2(hands.L[0],hands.R[0])/(Math.hypot(W,H)*.6),0,1);
      TIPS.forEach((id,i)=>{
        const l=hands.L[id],r=hands.R[id];
        const[ca,cb]=SPAIRS[i];
        laser(dc,l[0],l[1],r[0],r[1],ca,cb,stretch);
      });
      TIPS.forEach((id,i)=>{
        const l=hands.L[id],r=hands.R[id];
        const k=`t${i}`;if(!cooldowns[k])cooldowns[k]=0;
        if(d2(l,r)<40&&cooldowns[k]<=0){boom((l[0]+r[0])/2,(l[1]+r[1])/2);cooldowns[k]=55;}
        if(cooldowns[k]>0)cooldowns[k]--;
      });
    }
    if(hands.L)skeleton(dc,hands.L,false);
    if(hands.R)skeleton(dc,hands.R,true);

    particles=particles.filter(p=>!p.dead);
    particles.forEach(p=>{
      p.update();
      p.trail.forEach((pt,i)=>{
        const a=(i/p.trail.length)*p.life*.3;
        dc.beginPath();dc.arc(pt[0],pt[1],p.r*(i/p.trail.length)*.6,0,Math.PI*2);
        dc.fillStyle=`rgba(${p.col},${a})`;dc.fill();
      });
      dc.save();dc.shadowBlur=16;dc.shadowColor=`rgba(${p.col},${p.life})`;
      dc.beginPath();dc.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      dc.fillStyle=`rgba(${p.col},${p.life})`;dc.fill();dc.restore();
    });

    const cnt=(hands.L?1:0)+(hands.R?1:0);
    document.getElementById('hcount').textContent=cnt;
    document.getElementById('phands').className=cnt>0?'pill on':'pill';
  };
});

// BOOT
document.getElementById('startBtn').addEventListener('click',async()=>{
  document.getElementById('splash').classList.add('gone');
  document.getElementById('loader').classList.add('show');
  const fill=document.getElementById('lfill'),msg=document.getElementById('lmsg');
  let prog=0;
  const tick=setInterval(()=>{prog=Math.min(prog+Math.random()*7,85);fill.style.width=prog+'%';},250);

  msg.textContent='ACCESSING CAMERA…';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    vidEl=document.getElementById('vid');
    vidEl.srcObject=stream;
    await new Promise(r=>{vidEl.onloadeddata=r;setTimeout(r,3000);});
    document.getElementById('pcam').className='pill on';
  }catch(e){
    msg.textContent='CAMERA BLOCKED — ALLOW IN SAFARI SETTINGS';
    clearInterval(tick);return;
  }

  msg.textContent='LOADING HAND TRACKER…';
  try{
    const hp=ml5.handpose(vidEl,{flipHorizontal:false},()=>{
      clearInterval(tick);fill.style.width='100%';
      setTimeout(()=>document.getElementById('loader').classList.remove('show'),500);
    });
    hp.on('predict',r=>{predictions=r;});
  }catch(e){
    msg.textContent='ERROR: '+e.message;clearInterval(tick);
  }
});
</script>
</body>
</html>
