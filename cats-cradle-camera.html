<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CAT'S CRADLE</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root { --cyan:#00f5ff; --magenta:#ff00e4; --yellow:#fff200; }
  html, body {
    width:100%; height:100%; background:#020817;
    overflow:hidden; touch-action:none; -webkit-user-select:none;
    font-family:'Courier New',monospace;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);
    pointer-events:none; z-index:90;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(2,8,23,0.88) 100%);
    pointer-events:none; z-index:89;
  }
  #c { position:fixed; inset:0; width:100%; height:100%; z-index:1; }
  #vid { position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; top:0; left:0; }

  /* SPLASH */
  #splash {
    position:fixed; inset:0; background:#020817;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; z-index:200;
    padding:env(safe-area-inset-top,20px) 32px env(safe-area-inset-bottom,20px);
    transition:opacity 0.7s;
  }
  #splash.gone { opacity:0; pointer-events:none; }
  .ico { font-size:54px; animation:bob 2.5s ease-in-out infinite; }
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  h1 {
    font-size:clamp(30px,9vw,52px); font-weight:900; letter-spacing:.12em;
    color:var(--cyan); text-shadow:0 0 20px var(--cyan),0 0 60px rgba(0,245,255,.3);
    text-align:center;
  }
  .tag { font-size:10px; letter-spacing:.42em; color:var(--magenta); text-shadow:0 0 8px var(--magenta); text-align:center; }
  #splash p { font-size:12px; line-height:2; color:rgba(0,245,255,.5); text-align:center; max-width:280px; letter-spacing:.05em; }
  #splash p strong { color:var(--yellow); text-shadow:0 0 8px var(--yellow); }
  #startBtn {
    margin-top:8px; background:transparent; border:1.5px solid var(--cyan); color:var(--cyan);
    font-family:'Courier New',monospace; font-size:13px; font-weight:700;
    letter-spacing:.28em; padding:15px 44px; -webkit-tap-highlight-color:transparent;
    cursor:pointer; text-transform:uppercase;
    box-shadow:0 0 20px rgba(0,245,255,.15),inset 0 0 16px rgba(0,245,255,.04);
    transition:all .2s;
  }
  #startBtn:active { background:rgba(0,245,255,.1); transform:scale(.97); }

  /* HUD */
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 0;
    z-index:50; pointer-events:none;
  }
  #logo { font-size:12px; font-weight:900; letter-spacing:.2em; color:var(--cyan); text-shadow:0 0 10px var(--cyan); line-height:1.4; }
  #logo small { display:block; font-size:8px; letter-spacing:.32em; color:var(--magenta); text-shadow:0 0 6px var(--magenta); }
  #pills { display:flex; flex-direction:column; gap:4px; align-items:flex-end; }
  .pill { font-size:9px; letter-spacing:.1em; padding:4px 9px; border:1px solid rgba(0,245,255,.15); border-radius:20px; color:rgba(0,245,255,.35); display:flex; align-items:center; gap:5px; transition:all .4s; }
  .pill.on { border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 8px rgba(0,245,255,.2); }
  .led { width:5px; height:5px; border-radius:50%; background:rgba(0,245,255,.2); flex-shrink:0; }
  .pill.on .led { background:var(--cyan); box-shadow:0 0 5px var(--cyan); animation:blink 1.4s ease-in-out infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
  #hint { position:fixed; bottom:calc(env(safe-area-inset-bottom,8px)+6px); left:0; right:0; text-align:center; font-size:9px; letter-spacing:.2em; color:rgba(0,245,255,.2); text-transform:uppercase; z-index:50; pointer-events:none; }

  /* LOADER */
  #loader { position:fixed; inset:0; background:rgba(2,8,23,.95); display:none; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:300; }
  #loader.show { display:flex; }
  #lmsg { font-size:11px; letter-spacing:.28em; color:var(--cyan); text-shadow:0 0 8px var(--cyan); animation:blink 1s infinite; text-align:center; max-width:280px; line-height:1.9; padding:0 20px; }
  #ltrack { width:200px; height:2px; background:rgba(0,245,255,.12); border-radius:2px; overflow:hidden; }
  #lfill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--magenta)); box-shadow:0 0 6px var(--cyan); width:0%; transition:width .3s ease; }
  #lerr { font-size:11px; letter-spacing:.12em; color:var(--magenta); text-shadow:0 0 8px var(--magenta); text-align:center; max-width:280px; line-height:1.9; padding:0 20px; display:none; }
  #lerr.show { display:block; }
  #fallbackBtn { display:none; background:transparent; border:1px solid var(--magenta); color:var(--magenta); font-family:'Courier New',monospace; font-size:11px; letter-spacing:.2em; padding:12px 28px; cursor:pointer; text-transform:uppercase; -webkit-tap-highlight-color:transparent; }
  #fallbackBtn.show { display:block; }
</style>
</head>
<body>

<div id="splash">
  <div class="ico">🕸️</div>
  <h1>CAT'S CRADLE</h1>
  <div class="tag">NEON STRING RITUAL — iOS CAMERA</div>
  <p>Hold your iPhone up and raise <strong>both hands</strong> in front of the camera. Fingertips weave glowing laser strings.</p>
  <button id="startBtn">INITIATE SEQUENCE</button>
</div>

<div id="loader">
  <div id="lmsg">LOADING…</div>
  <div id="ltrack"><div id="lfill"></div></div>
  <div id="lerr"></div>
  <button id="fallbackBtn">SWITCH TO TOUCH MODE</button>
</div>

<div id="hud">
  <div id="logo">CAT'S CRADLE<small>NEON STRING RITUAL</small></div>
  <div id="pills">
    <div class="pill" id="pcam"><span class="led"></span>CAMERA</div>
    <div class="pill" id="phands"><span class="led"></span>HANDS: <span id="hcount">0</span></div>
  </div>
</div>

<canvas id="c"></canvas>
<video id="vid" autoplay playsinline muted></video>
<div id="hint">BRING FINGERTIPS TOGETHER TO DETONATE</div>

<!-- MediaPipe Tasks Vision - specifically built for Safari/iOS -->
<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ── CONSTANTS ────────────────────────────────────────────────
const TIPS=[4,8,12,16,20];
const CONNS=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
const CY=[0,245,255], MG=[255,0,228], YL=[255,242,0];
const SPAIRS=[[CY,MG],[MG,YL],[YL,CY],[CY,YL],[MG,CY]];

// ── STATE ───────────────────────────────────────────────────
let canvas, ctx, vidEl, landmarker;
let W, H, frame=0;
let lastVideoTime=-1;
let handData={left:null,right:null};
let particles=[], cooldowns={};
let animRunning=false;

// ── UTILS ───────────────────────────────────────────────────
const lerpC=(a,b,f)=>a.map((v,i)=>v+(b[i]-v)*f);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const d2=(a,b)=>Math.hypot(a[0]-b[0],a[1]-b[1]);
const rgba=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;

// ── PARTICLE ────────────────────────────────────────────────
class P {
  constructor(x,y,col){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*8;
    Object.assign(this,{x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,
      life:1,decay:.02+Math.random()*.025,r:2+Math.random()*5,col,trail:[]});
  }
  update(){
    this.trail.push([this.x,this.y]);
    if(this.trail.length>7)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;this.vy+=.13;this.vx*=.96;this.life-=this.decay;
  }
  get dead(){return this.life<=0;}
}

function boom(x,y){
  [CY,MG,YL,MG,CY].forEach(c=>{for(let i=0;i<8;i++)particles.push(new P(x,y,c));});
}

// ── DRAW LASER ───────────────────────────────────────────────
function laser(x1,y1,x2,y2,ca,cb,stretch){
  const thick=clamp(3.5-stretch*2.5,.5,3.5);
  const glow=clamp(30-stretch*16,5,30);
  const alpha=clamp(1-stretch*.5,.15,1);
  const mid=lerpC(ca,cb,.5);
  const wave=7*(1-stretch)*Math.sin(frame*.045+x1*.008);
  const mx=(x1+x2)/2+wave,my=(y1+y2)/2+wave*.4;
  [[alpha*.08,glow*2.8,thick*5],[alpha*.2,glow*1.3,thick*2.4],[alpha*.88,glow*.3,thick]].forEach(([a,blur,w])=>{
    const g=ctx.createLinearGradient(x1,y1,x2,y2);
    g.addColorStop(0,rgba(ca,a));g.addColorStop(.5,rgba(mid,a));g.addColorStop(1,rgba(cb,a));
    ctx.save();ctx.shadowBlur=blur;ctx.shadowColor=rgba(mid,Math.min(1,a*2));
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,my,x2,y2);
    ctx.strokeStyle=g;ctx.lineWidth=w;ctx.lineCap='round';ctx.stroke();ctx.restore();
  });
}

function skeleton(kps,col){
  CONNS.forEach(([a,b])=>{
    ctx.save();ctx.shadowBlur=6;ctx.shadowColor=rgba(col,.3);
    ctx.beginPath();ctx.moveTo(kps[a][0],kps[a][1]);ctx.lineTo(kps[b][0],kps[b][1]);
    ctx.strokeStyle=rgba(col,.2);ctx.lineWidth=1.2;ctx.stroke();ctx.restore();
  });
  kps.forEach(([x,y],i)=>{
    const isTip=TIPS.includes(i);
    const c=lerpC(col,YL,(i/20)*.28);
    const r=isTip?5.5:(i===0?6:3);
    ctx.save();ctx.shadowBlur=isTip?22:10;ctx.shadowColor=rgba(c,1);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=rgba(c,1);ctx.fill();
    ctx.shadowBlur=3;ctx.shadowColor='rgba(255,255,255,.9)';
    ctx.beginPath();ctx.arc(x,y,r*.38,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.88)';ctx.fill();
    ctx.restore();
  });
}

// ── LANDMARK → SCREEN ───────────────────────────────────────
function lmToScreen(lm){
  // MediaPipe Tasks gives normalized 0-1 coords
  // x is already mirrored for front camera in Tasks API
  return [lm.x*W, lm.y*H];
}

// ── DETECT LOOP ─────────────────────────────────────────────
function detectLoop(){
  if(!animRunning)return;
  if(vidEl.currentTime!==lastVideoTime && vidEl.readyState>=2){
    lastVideoTime=vidEl.currentTime;
    try{
      const results=landmarker.detectForVideo(vidEl, performance.now());
      handData={left:null,right:null};
      if(results.landmarks && results.landmarks.length>0){
        results.landmarks.forEach((lms,i)=>{
          const handedness=results.handednesses[i][0].categoryName;
          // Tasks API: "Left" from model = right hand on screen (already handles mirror)
          const side=handedness==='Left'?'right':'left';
          const kps=lms.map(lm=>{
            // Mirror x for natural feel
            return [(1-lm.x)*W, lm.y*H];
          });
          handData[side]=kps;
        });
      }
      const cnt=(handData.left?1:0)+(handData.right?1:0);
      document.getElementById('hcount').textContent=cnt;
      document.getElementById('phands').className=cnt>0?'pill on':'pill';
    }catch(e){}
  }
  requestAnimationFrame(detectLoop);
}

// ── RENDER LOOP ─────────────────────────────────────────────
function render(){
  if(!animRunning)return;
  frame++;

  // BG
  const bg=ctx.createRadialGradient(W/2,H*.4,0,W/2,H/2,Math.max(W,H)*.85);
  bg.addColorStop(0,'rgba(5,12,38,1)');bg.addColorStop(.5,'rgba(3,9,22,1)');bg.addColorStop(1,'rgba(2,8,23,1)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Grid
  ctx.save();ctx.globalAlpha=.032;ctx.strokeStyle='#00f5ff';ctx.lineWidth=.5;
  for(let x=0;x<W;x+=56){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=56){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();

  // Video silhouette
  if(vidEl.readyState>=2){
    try{
      ctx.save();ctx.globalAlpha=.13;ctx.filter='saturate(0) brightness(.35) sepia(1) hue-rotate(185deg)';
      ctx.translate(W,0);ctx.scale(-1,1);ctx.drawImage(vidEl,0,0,W,H);ctx.restore();
    }catch(e){}
  }

  const {left:L,right:R}=handData;

  // Strings
  if(L&&R){
    const stretch=clamp(d2(L[0],R[0])/(Math.hypot(W,H)*.6),0,1);
    TIPS.forEach((id,i)=>{
      laser(L[id][0],L[id][1],R[id][0],R[id][1],SPAIRS[i][0],SPAIRS[i][1],stretch);
    });
    // Collisions
    TIPS.forEach((id,i)=>{
      const k=`t${i}`;if(!cooldowns[k])cooldowns[k]=0;
      const dd=d2(L[id],R[id]);
      if(dd<40&&cooldowns[k]<=0){
        boom((L[id][0]+R[id][0])/2,(L[id][1]+R[id][1])/2);
        cooldowns[k]=55;
      }
      if(cooldowns[k]>0)cooldowns[k]--;
    });
  }

  if(L)skeleton(L,CY);
  if(R)skeleton(R,MG);

  // Particles
  particles=particles.filter(p=>!p.dead);
  particles.forEach(p=>{
    p.update();
    p.trail.forEach((pt,i)=>{
      const a=(i/p.trail.length)*p.life*.3;
      ctx.beginPath();ctx.arc(pt[0],pt[1],p.r*(i/p.trail.length)*.6,0,Math.PI*2);
      ctx.fillStyle=rgba(p.col,a);ctx.fill();
    });
    ctx.save();ctx.shadowBlur=14;ctx.shadowColor=rgba(p.col,p.life);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=rgba(p.col,p.life);ctx.fill();ctx.restore();
  });

  requestAnimationFrame(render);
}

// ── RESIZE ───────────────────────────────────────────────────
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}

// ── BOOT ────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click',async()=>{
  document.getElementById('splash').classList.add('gone');
  document.getElementById('loader').classList.add('show');
  const fill=document.getElementById('lfill'),msg=document.getElementById('lmsg');
  const err=document.getElementById('lerr'),fbBtn=document.getElementById('fallbackBtn');

  canvas=document.getElementById('c');
  ctx=canvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);

  let prog=0;
  const tick=setInterval(()=>{prog=Math.min(prog+Math.random()*5,80);fill.style.width=prog+'%';},300);

  // Camera
  msg.textContent='ACCESSING CAMERA…';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false
    });
    vidEl=document.getElementById('vid');
    vidEl.srcObject=stream;
    await new Promise(r=>{vidEl.onloadeddata=r;setTimeout(r,4000);});
    document.getElementById('pcam').className='pill on';
  }catch(e){
    clearInterval(tick);
    err.textContent='Camera blocked. Please allow camera access in Safari Settings → Camera.';
    err.classList.add('show');
    fbBtn.classList.add('show');
    return;
  }

  // MediaPipe Tasks Vision
  msg.textContent='LOADING MEDIAPIPE TASKS…';
  try{
    const vision=await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    fill.style.width='60%';
    msg.textContent='BUILDING HAND LANDMARKER…';

    landmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate:'GPU'
      },
      runningMode:'VIDEO',
      numHands:2,
      minHandDetectionConfidence:.5,
      minHandPresenceConfidence:.5,
      minTrackingConfidence:.5,
    });

    clearInterval(tick);fill.style.width='100%';
    await new Promise(r=>setTimeout(r,400));
    document.getElementById('loader').classList.remove('show');
    animRunning=true;
    detectLoop();
    render();
  }catch(e){
    clearInterval(tick);
    msg.style.display='none';
    err.textContent=`FAILED TO LOAD: ${e.message}. Try refreshing, or switch to touch mode below.`;
    err.classList.add('show');
    fbBtn.classList.add('show');
  }
});

// Fallback to touch mode
document.getElementById('fallbackBtn').addEventListener('click',()=>{
  window.location.href='data:text/html,<script>window.location="about:blank"<\/script>';
  // Just reload page — user can use touch version
  alert('Please open the touch version instead: cats-cradle-ios.html (the working one!)');
});
</script>
</body>
</html>
